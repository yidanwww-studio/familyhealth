  document.querySelectorAll('#phTypeRow [data-phtype]').forEach(d=>{
    d.style.borderColor = d.dataset.phtype===t?'var(--text)':'var(--border2)';
    d.style.background = d.dataset.phtype===t?'var(--bg3)':'var(--bg2)';
  });
}

function onPhysicalImgs(e){
  window._imgStore=window._imgStore||{};
  window._imgStore['physical_imgs']=Array.from(e.target.files||[]).filter(f=>f.type.startsWith('image/'));
  renderImgGrid('physical_imgs','removeImg');
}

async function doPhysicalAI(){
  const files=(window._imgStore||{})['physical_imgs']||[];
  if(!files.length){alert('请先选择体检报告图片');return;}
  const st=document.getElementById('physical_ai_status');
  const preview=document.getElementById('physical_ai_preview');
  if(st) st.textContent='⏳ AI 识别中，体检报告较多请耐心等待…';
  if(preview) preview.innerHTML='';

  const prompt='请识别这张体检报告图片。'
    +'只输出JSON，不要markdown，第一个字符必须是{：'
    +'{"date":"YYYY-MM-DD","hospital":"体检机构名称","summary":"体检总结",'
    +'"metrics":[{"name":"指标全称","value":"数值+单位","reference":"参考范围","status":"ok或warn或danger","category":"分类如血常规/生化/尿常规/肝功能/肾功能/血脂/血糖/甲状腺/心电图/超声/其他"}]}'
    +'。status规则：正常=ok，偏高偏低=warn，明显异常=danger。把所有指标都列出来不要遗漏。无法识别返回{"error":"原因"}';

  try{
    const allMetrics={};
    let mainInfo={};
    let recognized=0;

    for(let i=0;i<files.length;i++){
      if(st) st.textContent='⏳ 正在识别第'+(i+1)+'/'+files.length+'张…';
      const {b64,mime}=await readFile(files[i]);
      try{
        const r=await callAI(b64,mime,prompt);
        if(r._raw||r.error) continue;
        recognized++;
        if(!mainInfo.date&&r.date) mainInfo=r;
        if(r.hospital&&!mainInfo.hospital) mainInfo.hospital=r.hospital;
        (r.metrics||[]).forEach(m=>{ allMetrics[m.name]={...m}; });
      }catch(e){ console.log('识别失败',e); }
    }

    if(!recognized){if(st) st.textContent='❌ 识别失败，请手动填写';return;}

    window._physicalMetrics=Object.values(allMetrics);

    // 填入基本信息
    if(mainInfo.date) document.getElementById('ph_date').value=mainInfo.date;
    if(mainInfo.hospital) document.getElementById('ph_hosp').value=mainInfo.hospital;
    if(mainInfo.summary) document.getElementById('ph_summary').value=mainInfo.summary;

    // 按分类展示识别结果预览
    const metrics=Object.values(allMetrics);
    const abn=metrics.filter(m=>m.status!=='ok');
    const ok=metrics.filter(m=>m.status==='ok');

    // 按category分组
    const cats={};
    metrics.forEach(m=>{
      const cat=m.category||'其他';
      if(!cats[cat]) cats[cat]=[];
      cats[cat].push(m);
    });

    let prevHtml=`<div style="background:var(--bg2);border-radius:var(--radius);padding:10px;margin-top:6px;">
      <div style="font-size:12px;font-weight:600;margin-bottom:6px;">识别结果预览：共${metrics.length}项指标，${abn.length}项异常</div>`;

    if(abn.length){
      prevHtml+=`<div style="font-size:11px;font-weight:600;color:var(--warn-text);margin-bottom:4px;">⚠️ 异常指标（${abn.length}项）</div>
      <div class="mg" style="margin-bottom:8px;">${abn.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v warn">${esc(m.value)}</div><div class="mc-r">参考 ${esc(m.reference||'')}</div></div>`).join('')}</div>`;
    }

    // 分类显示正常
    Object.keys(cats).forEach(cat=>{
      const catOk=cats[cat].filter(m=>m.status==='ok');
      if(catOk.length){
        prevHtml+=`<details style="margin-bottom:4px;"><summary style="font-size:11px;color:var(--text3);cursor:pointer;">${esc(cat)} 正常（${catOk.length}项）</summary>
        <div class="mg" style="margin-top:4px;">${catOk.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v ok">${esc(m.value)}</div><div class="mc-r">✓</div></div>`).join('')}</div></details>`;
      }
    });

    prevHtml+=`</div>`;
    if(preview) preview.innerHTML=prevHtml;
    if(st) st.textContent=`✅ 识别完成（${files.length}张），共${metrics.length}项指标，${abn.length}项异常`;

  }catch(err){
    if(st) st.textContent='❌ 错误：'+err.message;
  }
}

function savePhysical(){
  const date=document.getElementById('ph_date').value;
  if(!date){alert('请填写体检日期');return;}
  const phType=document.getElementById('ph_type').value;
  const v={
    id:uid(),
    date,
    visitType:'physical',
    physicalType:phType,
    hospital:document.getElementById('ph_hosp').value,
    diagnosis:phType,
    content:document.getElementById('ph_summary').value,
    metrics:window._physicalMetrics||[],
    findings:[],
    medications:'',
    followUp:'',
    conclusion:''
  };
  window._physicalMetrics=null;
  if(!AD().visits) AD().visits=[];
  AD().visits.unshift(v);
  AD().visits.sort((a,b)=>b.date.localeCompare(a.date));
  saveState(); renderSidebar(); closeOverlay();
  showSaveBanner('体检记录已保存！');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[2].classList.add('active');
  CT='visits'; rVisits();
}

  const done = localStorage.getItem('onboarding_done');
  if(!done) showOnboarding(0);
}

function showOnboarding(step){
  const steps = [
    {
      emoji: '👨‍👩‍👧‍👦',
      title: '欢迎使用家庭健康档案',
      desc: '帮你把全家的健康信息整理在一个地方，永远不再找不到报告。',
      sub: '先给家庭成员起个名字吧',
      btnText: '开始设置 →',
      action: 'nextOnboarding(1)'
    },
    {
      emoji: '📷',
      title: '上传报告，AI 自动识别',
      desc: '拍照上传检查报告、病历或体检报告，AI 自动提取所有指标，异常的会高亮显示。',
      sub: '支持多张同时上传，混合上传也没问题',
      btnText: '下一步 →',
      action: 'nextOnboarding(2)'
    },
    {
      emoji: '🔒',
      title: '你的数据，只属于你',
      desc: '所有健康档案存储在你自己的设备里，我们的服务器看不到任何内容。AI 识别时图片会发送给 AI 处理，识别完即删除，不做任何存储。',
      sub: '建议定期在设置里导出备份',
      btnText: '开始使用 🎉',
      action: 'finishOnboarding()'
    }
  ];

  const s = steps[step];
  const dots = steps.map((_,i) =>
    `<div style="width:6px;height:6px;border-radius:50%;background:${i===step?'var(--text)':'var(--border2)'};"></div>`
  ).join('');

  showOverlay(`<div class="dialog" style="max-width:360px;text-align:center;">
    <div style="font-size:56px;margin-bottom:16px;">${s.emoji}</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:10px;">${s.title}</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:8px;white-space:pre-line;">${s.desc}</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:20px;">${s.sub}</div>
    <button class="btn-p" onclick="${s.action}" style="width:100%;padding:12px;font-size:14px;">${s.btnText}</button>
    ${step>0?`<button class="btn-o" onclick="showOnboarding(${step-1})" style="width:100%;margin-top:8px;">← 上一步</button>`:''}
    <div style="display:flex;justify-content:center;gap:6px;margin-top:16px;">${dots}</div>
    ${step===0?`<button onclick="finishOnboarding()" style="background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;margin-top:8px;">跳过引导</button>`:''}
  </div>`);
}

function nextOnboarding(step){
  showOnboarding(step);
}

function finishOnboarding(){
  localStorage.setItem('onboarding_done','1');
  closeOverlay();
  // 第一次完成引导，弹出添加成员
  const m = state.members.find(x=>x.name==='成员1'||x.name==='成员2');
  if(m && (m.name==='成员1'||m.name==='成员2')){
    setTimeout(()=>showEditMember(CM), 300);
  }
}

  localStorage.removeItem('family_health_v2');
  location.reload();
}
