<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --info-bg:#e8f2fc;--info-text:#1a5fa8;
  --success-bg:#eaf5e6;--success-text:#2a7a3b;
  --warn-bg:#fef4e0;--warn-text:#8a5a00;
  --danger-bg:#fdecea;--danger-text:#a82a2a;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--info-bg:#0d2d4a;--info-text:#7ab8f5;--success-bg:#0d2d18;--success-text:#6ed68a;--warn-bg:#2d1f00;--warn-text:#f0b040;--danger-bg:#2d0d0d;--danger-text:#f07070;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh;}
.app{display:flex;height:100vh;max-width:1100px;margin:0 auto;background:var(--bg);}
.sidebar{width:64px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;background:var(--bg2);flex-shrink:0;padding:8px 0;}
.sh{display:none;}
.member-list{padding:4px;flex:1;overflow-y:auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mi{display:flex;align-items:center;justify-content:center;padding:4px;border-radius:var(--radius);cursor:pointer;width:48px;height:48px;transition:all 0.15s;position:relative;}
.mi:hover{background:var(--bg);}
.mi.active{background:var(--bg);box-shadow:0 0 0 2px var(--border2);}
.mi.active::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--text);border-radius:2px 0 0 2px;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0;}
.mn{display:none;}
.ms{display:none;}
.add-member{width:40px;height:40px;border:1.5px dashed var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text3);margin:4px auto;}
.add-member:hover{background:var(--bg);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
.topbar-left{min-width:0;flex:1;}
.topbar h2{font-size:15px;font-weight:600;color:var(--text);}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.tag-chip{font-size:10px;padding:1px 7px;border-radius:20px;background:#eeedfe;color:#534ab7;}
.tag-chip.child{background:#e1f5ee;color:#0f6e56;}
.tab-bar{display:flex;gap:2px;padding:6px 12px;border-bottom:0.5px solid var(--border);background:var(--bg2);overflow-x:auto;}
.tab{padding:5px 10px;border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--text2);border:none;background:transparent;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;border:0.5px solid var(--border);}
.content{flex:1;overflow-y:auto;padding:16px;}
.btn-p{background:var(--text);color:var(--bg);border:none;padding:8px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;font-weight:500;}
.btn-p:hover{opacity:0.85;}
.btn-o{border:0.5px solid var(--border2);background:transparent;color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:11px;cursor:pointer;}
.btn-o:hover{background:var(--bg2);}
.card{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:8px;background:var(--bg);}
.card.cp{cursor:pointer;}
.card.cp:hover{border-color:var(--border2);}
.card.open .db{display:block;}
.db{display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-block;}
.bok{background:var(--success-bg);color:var(--success-text);}
.bwarn{background:var(--warn-bg);color:var(--warn-text);}
.bdanger{background:var(--danger-bg);color:var(--danger-text);}
.binfo{background:var(--info-bg);color:var(--info-text);}
.bpurple{background:#eeedfe;color:#534ab7;}
.ok{color:var(--success-text);}
.warn{color:var(--warn-text);}
.danger{color:var(--danger-text);}
.ai-box{background:var(--info-bg);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--info-text);line-height:1.7;margin-bottom:8px;}
.mg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-bottom:8px;}
.mc{background:var(--bg2);border-radius:var(--radius);padding:8px 10px;}
.mc-n{font-size:10px;color:var(--text2);margin-bottom:2px;}
.mc-v{font-size:13px;font-weight:500;}
.mc-r{font-size:10px;color:var(--text3);margin-top:1px;}
.fl{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;margin-top:9px;}
.af{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;background:var(--bg2);}
.af h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--bg);font-family:inherit;outline:none;writing-mode:horizontal-tb;}
input:focus,select:focus,textarea:focus{border-color:var(--text3);}
label,button,.tab,.btn-p,.btn-o,.badge,.mn,.ms,.fl{writing-mode:horizontal-tb !important;text-orientation:mixed !important;}
.nc{border-left:2px solid #378add;padding:8px 11px;margin-bottom:7px;background:var(--bg2);border-radius:var(--radius);}
.nc.nw{border-left-color:#ba7517;}
.pw{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:6px 0 3px;}
.pb{height:100%;border-radius:3px;}
.ab{background:var(--danger-bg);border-radius:var(--radius);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--danger-text);display:flex;align-items:center;gap:8px;}
.ab.aw{background:var(--warn-bg);color:var(--warn-text);}
.sl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px;}
.icz{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:24px 16px;text-align:center;cursor:pointer;margin-bottom:12px;}
.icz:hover{background:var(--bg2);}
.es{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px;}
.rb{display:flex;gap:6px;margin-top:10px;}
.icon{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius);font-size:16px;flex-shrink:0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.dialog{background:var(--bg);border-radius:var(--radius-lg);padding:18px;width:100%;max-width:360px;border:0.5px solid var(--border);max-height:90vh;overflow-y:auto;}
/* 多图预览 */
.img-grid{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:var(--bg2);border-radius:var(--radius);margin-bottom:8px;min-height:44px;}
.img-thumb-wrap{position:relative;display:inline-block;}
.img-thumb{width:68px;height:68px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);display:block;}
.img-rm{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#e24b4a;color:#fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;}
/* 上传分析区 */
.analyze-box{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:12px;background:var(--bg2);}
.analyze-box h4{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;}
.analyzing{text-align:center;padding:20px;font-size:12px;color:var(--text2);}
/* ICS */
.ib{font-size:11px;color:var(--info-text);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;margin-top:4px;margin-right:10px;}
/* Cal */
.cal-day{text-align:center;font-size:12px;padding:5px 2px;border-radius:var(--radius);cursor:default;}
.ev-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;background:var(--bg);}
/* TL */
.tl-item{display:flex;gap:10px;margin-bottom:12px;}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.tl-line{width:1px;background:var(--border);flex:1;margin-top:3px;}
/* Child */
.child-section{margin-bottom:14px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:640px){.sidebar{width:56px;}.tab{padding:5px 7px;font-size:11px;}}
</style>
</head>

<script>
// ── 配置 ──────────────────────────────────────────────────────────────
const WORKER_URL = 'https://familyhealthv1.wangyidan1113.workers.dev';
const STORE_KEY  = 'family_health_v2';

// ── 工具函数 ──────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ if(!s)return''; const p=s.split('-'); return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日'; }
function dBet(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function addD(s,n){ const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function calcFU(from,text){
  const d=new Date(from);
  const m2=text.match(/(\d+)\s*周/), m3=text.match(/(\d+)\s*个?月/), m4=text.match(/(\d+)\s*天/);
  if(m2) d.setDate(d.getDate()+parseInt(m2[1])*7);
  else if(m3) d.setMonth(d.getMonth()+parseInt(m3[1]));
  else if(m4) d.setDate(d.getDate()+parseInt(m4[1]));
  else return null;
  return d.toISOString().split('T')[0];
}
const today = new Date(); today.setHours(0,0,0,0);
const TS = today.toISOString().split('T')[0];
let calMonth = new Date(today.getFullYear(), today.getMonth(), 1);

// ── 状态管理 ──────────────────────────────────────────────────────────
function defState(){
  return {
    currentMember: 0,
    members:[
      {id:0, name:'成员1', emoji:'👤', c1:'#e1f5ee', c2:'#0f6e56', tags:[], isChild:false},
      {id:1, name:'成员2', emoji:'👤', c1:'#fbeaf0', c2:'#993556', tags:[], isChild:false},
    ],
    data:{
      0:{reports:[], notes:[], imaging:[], meds:[], events:[], feelings:[], checkins:[], visits:[], child:{vaccines:[],growth:[],allergies:[]}},
      1:{reports:[], notes:[], imaging:[], meds:[], events:[], feelings:[], checkins:[], visits:[], child:{vaccines:[],growth:[],allergies:[]}},
    }
  };
}
function loadState(){
  try{ const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r); }catch(e){}
  return defState();
}
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }

let state = loadState();
let CM = state.currentMember||0;
let CT = 'feelings';

function AD(id){ 
  if(id===undefined) id=CM;
  if(!state.data[id]) state.data[id]={reports:[],notes:[],imaging:[],meds:[],events:[],child:{vaccines:[],growth:[],allergies:[]}};
  if(!state.data[id].child) state.data[id].child={vaccines:[],growth:[],allergies:[]};
  return state.data[id];
}

// ── AI 识别核心 ───────────────────────────────────────────────────────
function readFile(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>resolve({b64:ev.target.result.split(',')[1], mime:file.type||'image/jpeg'});
    r.readAsDataURL(file);
  });
}

async function callAI(b64, mime, prompt){
  const resp = await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({imageBase64:b64, imageMime:mime, customPrompt:prompt})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error);
  let text = data.text||'';
  // 如果 worker 标记了非 JSON
  if(data._notJson){
    return {_raw: text};
  }
  // 提取 JSON
  const s=text.indexOf('{'), e=text.lastIndexOf('}');
  if(s!==-1&&e>s) text=text.slice(s,e+1).trim();
  else return {_raw: text};
  try {
    return JSON.parse(text);
  } catch(parseErr) {
    return {_raw: text, _parseError: parseErr.message};
  }
}

// 渲染多图预览网格（返回HTML字符串 + 存储files到window._imgStore）
function makeImgGrid(files, storeKey, onRemoveFn){
  window._imgStore = window._imgStore||{};
  window._imgStore[storeKey] = Array.from(files);
  return renderImgGrid(storeKey, onRemoveFn);
}

function renderImgGrid(storeKey, onRemoveFn){
  const grid = document.getElementById('grid_'+storeKey);
  if(!grid) return;
  const files = (window._imgStore||{})[storeKey]||[];
  grid.innerHTML = '';
  if(!files.length){
    grid.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px;">暂无图片</div>';
    return;
  }
  files.forEach(function(f, i){
    const url = URL.createObjectURL(f);
    const wrap = document.createElement('div');
    wrap.className = 'img-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'img-thumb';
    img.src = url;
    img.alt = '图片'+(i+1);
    const rm = document.createElement('div');
    rm.className = 'img-rm';
    rm.textContent = '×';
    rm.addEventListener('click', function(){
      window._removeImgAt(storeKey, i, onRemoveFn);
    });
    wrap.appendChild(img);
    wrap.appendChild(rm);

  });
}

function _removeImgAt(storeKey, idx, onRemoveFn){
  const files = (window._imgStore||{})[storeKey]||[];
  files.splice(idx, 1);
  window._imgStore[storeKey] = files;
  renderImgGrid(storeKey, onRemoveFn);
  // 同步更新文件计数显示
  const countEl = document.getElementById('repFileCount') || document.getElementById('noteImgCount');
  if(countEl && files.length) countEl.textContent = files.length+'张图片已选';
  else if(countEl && !files.length) countEl.textContent = '';
}

function removeImg(storeKey, idx){

}

async function doNoteAI(sk){
  const files=(window._imgStore||{})[sk]||[];
  if(!files.length){alert('请先选择图片');return;}
  const st=document.getElementById('note_ai_status');
  if(st) st.textContent='⏳ AI 识别中，请稍候…';
  const prompt='请仔细识别这张医疗病历图片（门诊病历/处方单/诊断书/出院小结等）。'
    +'只输出JSON，不要任何markdown，第一个字符必须是{：'
    +'{"type":"门诊病历或住院记录或急诊记录或复诊记录","date":"就诊日期YYYY-MM-DD",'
    +'"hospital":"医院全称","department":"科室","doctor":"医生姓名",'
    +'"diagnosis":"主要诊断（完整）",'
    +'"content":"病历内容和医嘱的完整文字，包括检查结果、治疗方案、用药说明、注意事项",'
    +'"followUp":"复查要求和时间",'
    +'"medications":"本次开具的所有药物，逗号分隔"}'
    +'。请完整提取报告中的文字内容，不要遗漏。无法识别返回{"error":"原因"}';
  try{
    const results=[];
    for(let i=0;i<files.length;i++){
      if(st) st.textContent=`⏳ 正在识别第${i+1}/${files.length}张…`;
      const {b64,mime}=await readFile(files[i]);
      try{
        results.push(await callAI(b64,mime,prompt));
      }catch(e){
        if(st) st.textContent='❌ 错误：'+e.message;
        results.push({_raw:e.message, error:e.message});
      }
    }
    if(!results.length){if(st) st.textContent='❌ 识别失败，请手动填写';return;}
    const main=results[0];
    // 如果 JSON 解析失败，把原始文本放到结论框里
    if(main._raw){
      if(st) st.textContent='⚠️ AI识别完成，但格式转换失败，已将原始内容填入结论框，请手动整理';
      const concl=document.getElementById('iConclusion');
      if(concl) concl.value=main._raw.slice(0,1000);
      return;
    }
    if(main.error){if(st) st.textContent='⚠️ '+main.error;return;}
    // 合并多张
    if(results.length>1){
      const extra=results.slice(1).map(r=>r.content||'').filter(Boolean).join('\n');
      if(extra) main.content=(main.content||'')+'\n\n'+extra;
      const meds=results.slice(1).map(r=>r.medications||'').filter(Boolean).join('、');
      if(meds) main.medications=[main.medications,meds].filter(Boolean).join('、');
    }
    // 填入表单
    if(main.date) document.getElementById('nDate').value=main.date;
    if(main.type){const sel=document.getElementById('nType');for(let i=0;i<sel.options.length;i++){if(sel.options[i].text.includes(main.type)){sel.selectedIndex=i;break;}}}
    if(main.hospital) document.getElementById('nHosp').value=main.hospital;
    if(main.department) document.getElementById('nDept').value=main.department;
    if(main.doctor) document.getElementById('nDoc').value=main.doctor;
    if(main.diagnosis) document.getElementById('nDiag').value=main.diagnosis;
    let ct=main.content||'';
    if(main.medications) ct+=(ct?'\n\n':'')+'【开具药物】'+main.medications;
    if(ct) document.getElementById('nContent').value=ct;
    if(main.followUp) document.getElementById('nFollowUp').value=main.followUp;
    if(st) st.textContent=`✅ 识别完成（${files.length}张），已自动填入，请检查后保存`;
  }catch(err){
    const msg=err.message||'';
    if(st) st.textContent='❌ '+(msg.startsWith('RAW:')||msg.startsWith('PARSE_FAIL:')?'AI返回格式有误，请手动填写':'错误：'+msg);
  }
}

async function doRepAI(sk){
  const files=(window._imgStore||{})[sk]||[];
  if(!files.length){alert('请先选择图片');return;}
  const typeVal=document.getElementById('repType')?.value||'auto';
  const st2=document.getElementById('rep_ai_status');
  const res=document.getElementById('rep_result');
  if(st2) st2.textContent='⏳ AI 识别中…';
  if(res) res.innerHTML='';
  const typeStr=typeVal!=='auto'?`（报告类型：${typeVal}）`:'';
  const prompt='请仔细识别这张医疗检查报告图片'+typeStr+'。'
    +'只输出JSON，不要任何markdown或多余文字，第一个字符必须是{：'
    +'{"reportType":"报告类型名称","date":"检查日期YYYY-MM-DD","hospital":"医院名称","summary":"2-3句分析总结，说明哪些指标异常及临床意义","abnormalCount":数字,'
    +'"metrics":[{"name":"指标全称（英文缩写）","value":"数值+单位","reference":"参考范围","status":"ok或warn或danger"}]}'
    +'。status规则：在参考范围内=ok，轻度偏高/偏低=warn，明显异常=danger。'
    +'把报告中所有指标都列出来，不要遗漏。无法识别返回{"error":"原因"}';
  try{
    const results=[];
    for(let i=0;i<files.length;i++){
      if(st2) st2.textContent=`⏳ 正在识别第${i+1}/${files.length}张…`;
      const {b64,mime}=await readFile(files[i]);
      try{
        results.push(await callAI(b64,mime,prompt));
      }catch(e){
        if(st2) st2.textContent='❌ 错误：'+e.message;
        results.push({_raw:e.message, error:e.message});
      }
    }
    if(!results.length){if(st2) st2.textContent='❌ 识别失败';return;}
    // 过滤掉解析失败的（_raw）和 error
    const valid=results.filter(r=>!r.error&&!r._raw);
    if(!valid.length){
      // 如果有 _raw，说明 AI 有返回但解析失败
      const hasRaw=results.find(r=>r._raw);
      if(hasRaw){if(st2) st2.textContent='⚠️ AI有返回内容但格式有误，请切换到"手动录入报告"粘贴内容';return;}
      if(st2) st2.textContent='❌ '+(results[0].error||'识别失败');return;
    }
    const metricsMap={};
    valid.forEach(r=>(r.metrics||[]).forEach(m=>{ metricsMap[m.name]=m; }));
    const allMetrics=Object.values(metricsMap);
    const abn=allMetrics.filter(m=>m.status!=='ok').length;
    const merged={
      reportType:valid[0].reportType||'医疗报告',
      date:valid[0].date||'',
      hospital:valid[0].hospital||'',
      summary:(valid.length===1?valid[0].summary:'共'+valid.length+'张报告。'+valid.map(r=>r.summary).filter(Boolean).join(' ')),
      abnormalCount:abn, metrics:allMetrics, pageCount:files.length
    };
    window._lastMerged=merged;
    if(st2) st2.textContent=`✅ 识别完成（${files.length}张）`;
    // 把识别到的日期填入日期框
    if(merged.date && document.getElementById('repDate')){
      document.getElementById('repDate').value=merged.date;
    }
    if(merged.hospital && document.getElementById('repHosp')){
      document.getElementById('repHosp').value=merged.hospital;
    }
    // 显示结果

async function doImagingAI(sk){
  const files=(window._imgStore||{})[sk]||[];
  if(!files.length){alert('请先选择影像图片');return;}
  const st=document.getElementById('img_ai_status');
  if(st) st.textContent='⏳ AI 正在识别影像报告…';

  const prompt='请仔细识别这张医疗影像报告图片（超声/CT/MRI/X光/内镜等）。'
    +'只输出JSON，不要任何markdown，第一个字符必须是{：'
    +'{"type":"影像类型全称","hospital":"医院全称","department":"科室","doctor":"报告医生姓名","date":"检查日期YYYY-MM-DD",'
    +'"findings":[{"location":"解剖部位名称","status":"ok或warn或danger","desc":"该部位所见的完整原文描述"}],'
    +'"conclusion":"影像提示/结论的完整原文","suggestion":"随访建议和复查要求","aiSummary":"2-3句临床总结，说明主要发现和建议"}'
    +'。status规则：完全正常=ok；有任何异常发现（结石/肌瘤/囊肿/占位/积液/钙化/增大/缩小/回声不均/边界不清等）=warn；高度怀疑恶性或危急情况=danger。'
    +'严格忠实于报告原文，凡报告中提到的异常必须标warn或danger，不得美化为ok。'
    +'无法识别返回{"error":"原因"}';

  try{
    const results=[];
    for(let i=0;i<files.length;i++){
      if(st) st.textContent='⏳ 正在识别第'+(i+1)+'/'+files.length+'张…';
      const {b64,mime}=await readFile(files[i]);
      try{
        const r=await callAI(b64,mime,prompt);
        results.push(r);
      }catch(e){
        if(st) st.textContent='❌ 错误：'+e.message;
        console.error('callAI error:', e);
        results.push({_raw: e.message, error: e.message});
      }
    }
    if(!results.length){if(st) st.textContent='❌ 识别失败，请手动填写';return;}
    const main=results[0];
    // 如果 JSON 解析失败，把原始文本放到结论框里
    if(main._raw){
      if(st) st.textContent='⚠️ AI识别完成，但格式转换失败，已将原始内容填入结论框，请手动整理';
      const concl=document.getElementById('iConclusion');
      if(concl) concl.value=main._raw.slice(0,1000);
      return;
    }
    if(main.error){if(st) st.textContent='⚠️ '+main.error;return;}

    // 合并多张结果的findings
    if(results.length>1){
      results.slice(1).forEach(r=>{
        (r.findings||[]).forEach(f=>{
          if(!main.findings.find(x=>x.location===f.location)) main.findings.push(f);
        });
      });
    }

    // 自动填入表单
    // 直接填入AI识别的类型
    if(main.type) document.getElementById('iType').value=main.type;
    if(main.hospital) document.getElementById('iHosp').value=main.hospital;
    if(main.department) document.getElementById('iDept').value=main.department;
    if(main.doctor) document.getElementById('iDoc').value=main.doctor;
    if(main.date) document.getElementById('iDate').value=main.date;

    // 填入findings（每行：部位,状态,描述）
    if(main.findings&&main.findings.length){
      document.getElementById('iFindings').value=main.findings.map(f=>f.location+','+f.status+','+f.desc).join('\n');
    }
    if(main.conclusion) document.getElementById('iConclusion').value=main.conclusion;
    if(main.suggestion) document.getElementById('iSugg').value=main.suggestion;
    const abnCount=(main.findings||[]).filter(f=>f.status!=='ok').length;
    if(st) st.textContent='✅ 识别完成！发现 '+abnCount+' 项异常，已自动填入，请检查后保存';
  }catch(err){
    const msg = err.message||'';
    if(msg.startsWith('RAW:')){
      if(st) st.textContent='⚠️ AI返回了内容但格式有误，请手动填写。原始内容：'+msg.slice(4,100);
    } else if(msg.startsWith('PARSE_FAIL:')){
      // Try to use raw text as conclusion at least
      if(st) st.textContent='⚠️ JSON解析失败，请手动填写。';
      const rawText = msg.slice(11);
      const concl = document.getElementById('iConclusion');
      if(concl && !concl.value) concl.value = rawText;
    } else {
      if(st) st.textContent='❌ 错误：'+msg;
    }
  }
}

// ── 用药管理 ──────────────────────────────────────────────────────────
function getRD(m){const du=Math.max(0,dBet(m.startDate,TS));return Math.max(0,m.totalQty-du*m.timesPerDay*m.dosePerTime);}
function getDays(m){const r=getRD(m),d=m.timesPerDay*m.dosePerTime;return d>0?Math.floor(r/d):999;}
function getROD(m){return addD(TS,getDays(m));}
function getRRD(m){return addD(getROD(m),-7);}
function getMSt(m){if(!m.active)return'done';const d=getDays(m);return d<=0?'empty':d<=7?'urgent':d<=14?'warning':'ok';}

          <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">${(m.times||[]).map(t=>`<span style="background:var(--bg2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);">⏰${esc(t)}</span>`).join('')}</div>

          ${m.warnings?`<div style="font-size:11px;color:var(--warn-text);margin-top:4px;background:var(--warn-bg);padding:4px 8px;border-radius:var(--radius);">⚠️ ${esc(m.warnings)}</div>`:``}
          <div style="margin-top:6px;font-size:11px;color:var(--text3);">预计用完：${getROD(m)} · 建议开药：${getRRD(m)}</div>

function updTF(){
  const n=parseInt(document.getElementById('mTm')?.value)||3;
  const defs=['早饭前','午饭前','晚饭前','睡前','早饭后','午饭后'];
  const w=document.getElementById('tfWrap'); if(!w)return; w.innerHTML='';
  for(let i=0;i<n;i++){const inp=document.createElement('input');inp.type='text';inp.value=defs[i]||'';inp.placeholder='时间';inp.style.cssText='width:calc(33% - 4px);min-width:70px;font-size:12px;';inp.id='tf_'+i;w.appendChild(inp);}
}

function saveMed(){
  const name=document.getElementById('mN')?.value.trim(), tot=parseInt(document.getElementById('mTot')?.value);
  if(!name||!tot){alert('请填写名称和数量');return;}
  const n=parseInt(document.getElementById('mTm').value)||1; const times=[];
  for(let i=0;i<n;i++) times.push(document.getElementById('tf_'+i)?.value||'');
  const m={id:uid(),name,spec:document.getElementById('mSp').value,startDate:document.getElementById('mSt').value||TS,totalQty:tot,unit:document.getElementById('mUn').value||'粒',timesPerDay:n,dosePerTime:parseInt(document.getElementById('mDs').value)||1,times,indication:document.getElementById('mIn').value,doctor:document.getElementById('mDc').value,hospital:document.getElementById('mHp').value,note:document.getElementById('mNt').value,warnings:document.getElementById('mWarn')?.value||'',active:true};
  AD().meds.unshift(m);

  saveState();renderSidebar();closeOverlay();rt('meds');
}

function addCustomTagChip(){
  const inp=document.getElementById('customTag');
  const val=inp.value.trim(); if(!val){return;}
  // 检查是否已存在
  const existing=Array.from(document.querySelectorAll('#tagPicker [data-tag], #customTagPicker [data-tag]')).map(e=>e.dataset.tag);
  if(existing.includes(val)){alert('标签已存在');return;}
  const picker=document.getElementById('customTagPicker');
  if(!picker) return;
  const div=document.createElement('div');
  div.dataset.tag=val; div.dataset.active='1'; div.dataset.custom='1';
  div.style.cssText='display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:20px;border:0.5px solid #534ab7;background:#eeedfe;color:#534ab7;';
  div.innerHTML=val+'<span onclick="this.parentElement.remove()" style="font-size:13px;font-weight:600;cursor:pointer;color:#534ab7;line-height:1;">×</span>';
  picker.appendChild(div);
  inp.value='';

function saveTags(){
  const m=state.members.find(x=>x.id===CM); if(!m)return;
  const presetSelected=Array.from(document.querySelectorAll('#tagPicker [data-tag]')).filter(c=>c.dataset.active==='1').map(c=>c.dataset.tag);
  const customSelected=Array.from(document.querySelectorAll('#customTagPicker [data-tag]')).filter(c=>c.dataset.active!=='0').map(c=>c.dataset.tag);
  m.tags=[...presetSelected,...customSelected];
  saveState();renderSidebar();
  // 刷新顶部标签显示
  const tagRow=document.getElementById('tagRow');
  if(tagRow){
    const tags=m.tags||[];
    tagRow.innerHTML=tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')+(m.isChild?'<span class="tag-chip child">👶儿童</span>':'');

function rCalendar(){
  const evs=AD().events, meds=AD().meds.filter(m=>m.active);
  const c=document.getElementById('mc');
  const yr=calMonth.getFullYear(), mo=calMonth.getMonth();
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dNames=['日','一','二','三','四','五','六'];
  const eMap={}, mMap={};
  evs.forEach(e=>{if(e.date)(eMap[e.date]=eMap[e.date]||[]).push(e);});
  meds.forEach(m=>{const d=getRRD(m);if(d)(mMap[d]=mMap[d]||[]).push(m);});
  const fd=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate(), pd=new Date(yr,mo,0).getDate();
  let cells='';
  for(let i=0;i<fd;i++) cells+=`<div style="text-align:center;font-size:12px;padding:5px 2px;color:var(--text3);">${pd-fd+1+i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=new Date(yr,mo,d).getTime()===today.getTime();
    const eArr=eMap[ds]||[], mArr=mMap[ds]||[];
    let bg='',tc='var(--text)',fw='400';
    if(eArr.length){bg='#faeeda';tc='#854f0b';fw='600';}
    else if(mArr.length){bg='#eeedfe';tc='#534ab7';fw='600';}
    else if(isT){bg='var(--bg2)';}
    const oc=(eArr.length||mArr.length)?'onclick="hlEv(\''+ds+'\')" style="cursor:pointer;"' :'';
    cells+=`<div ${oc} style="text-align:center;font-size:12px;padding:5px 2px;border-radius:var(--radius);background:${bg};color:${tc};font-weight:${fw};">${d}${(eArr.length||mArr.length)?`<div style="width:4px;height:4px;border-radius:50%;background:currentColor;margin:1px auto 0;"></div>`:'<div style="height:5px;"></div>'}</div>`;
  }
  const rem=(7-(fd+dim)%7)%7; for(let i=1;i<=rem;i++) cells+=`<div style="text-align:center;font-size:12px;padding:5px 2px;color:var(--text3);">${i}</div>`;
  const allEvs=[...evs].sort((a,b)=>a.date.localeCompare(b.date));
  const up=allEvs.filter(e=>e.date>=TS), past=allEvs.filter(e=>e.date<TS).reverse();
  const rEv=(e,ip)=>{
    const pts=e.date.split('-');
    const mon=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'][parseInt(pts[1])];
    const evT = EV_TYPES.find(x=>x.key===e.evType)||(e.isMedReminder?EV_TYPES.find(x=>x.key==='med'):EV_TYPES.find(x=>x.key==='other'));
    const bgC = evT.color+'18';
    const txC = evT.color;
    return `<div class="ev-item" id="ev_${e.date.replace(/-/g,'')}" style="${ip?'opacity:0.5;':''}">
      <div style="border-radius:var(--radius);padding:3px 7px;text-align:center;min-width:44px;flex-shrink:0;background:${ip?'var(--bg2)':bgC};">
        <div style="font-size:18px;">${evT.icon}</div>
        <div style="font-size:9px;color:${ip?'var(--text3)':txC};">${mon}</div>
        <div style="font-size:15px;font-weight:600;line-height:1.2;color:${ip?'var(--text2)':txC};">${parseInt(pts[2])}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="font-size:13px;font-weight:500;">${esc(e.title)}</span>
          <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:${evT.color+'18'};color:${evT.color};">${evT.label}</span>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">
          ${e.time?e.time+' · ':''}${[e.hospital,e.department,e.doctor?e.doctor+'医生':''].filter(Boolean).join(' · ')}
        </div>
        ${e.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px;">${esc(e.note)}</div>`:''}
        <div style="margin-top:5px;">
          <button class="ib" onclick="dlICS('${e.id}')">📅 导出.ics</button>
          <button class="ib" style="color:var(--text2);" onclick="cpEv('${e.id}')">📋 复制</button>
          <button class="ib" style="color:var(--danger-text);" onclick="delEv('${e.id}')">🗑 删除</button>
        </div>
      </div>
    </div>`;
  };
  c.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button class="btn-o" onclick="chM(-1)">◀</button>
      <span style="font-size:15px;font-weight:600;">${yr}年 ${mNames[mo]}</span>
      <button class="btn-o" onclick="chM(1)">▶</button>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;font-size:10px;margin-bottom:8px;">
      ${EV_TYPES.map(t=>`<span style="background:${t.color}18;padding:2px 7px;border-radius:10px;color:${t.color};">${t.icon} ${t.label}</span>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;">
      ${dNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);padding:3px 0;">${d}</div>`).join('')}${cells}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="sl" style="margin-bottom:0;">即将到来（${up.length}）</div>
      <button class="btn-o" onclick="showEvDialog('复查','','','','','')">＋ 新增提醒</button>
    </div>
    ${up.length?up.map(e=>rEv(e,false)).join(''):'<div style="text-align:center;color:var(--text3);padding:12px;font-size:12px;">暂无即将到来的提醒</div>'}
    ${past.length?`<div class="sl" style="margin-top:14px;margin-bottom:7px;">已过期（${past.length}）</div>${past.map(e=>rEv(e,true)).join('')}`:''}
  `;
}

function selectEvType(key, el){

function saveEv(){
  const evType = document.getElementById('evType')?.value||'other';
  const t = EV_TYPES.find(x=>x.key===evType)||EV_TYPES[EV_TYPES.length-1];
  const ev={
    id:uid(),
    evType,
    icon:t.icon,
    color:t.color,
    title:document.getElementById('evT').value,
    date:document.getElementById('evD').value,
    time:document.getElementById('evTime')?.value||'',
    hospital:document.getElementById('evH').value,
    department:document.getElementById('evDp').value,
    doctor:document.getElementById('evDc').value,
    note:document.getElementById('evN').value
  };
  if(!ev.title||!ev.date){alert('请填写事项和日期');return;}
  AD().events.unshift(ev); saveState();renderSidebar();closeOverlay();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[5].classList.add('active');
  CT='calendar'; rCalendar();

function dlICS(id){
  const e=AD().events.find(x=>x.id===id); if(!e)return;
  const d=e.date.replace(/-/g,'');
  const ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\nUID:'+id+'@health\r\nDTSTART;VALUE=DATE:'+d+'\r\nDTEND;VALUE=DATE:'+d+'\r\nSUMMARY:'+e.title+'\r\nLOCATION:'+[e.hospital,e.department].filter(Boolean).join(' ')+'\r\nDESCRIPTION:'+(e.note||'')+(e.doctor?'\\n医生：'+e.doctor:'')+'\r\nBEGIN:VALARM\r\nTRIGGER:-P1D\r\nACTION:DISPLAY\r\nDESCRIPTION:明天提醒：'+e.title+'\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR';
  dlFile(ics,'text/calendar','提醒_'+e.title+'.ics');
}
function cpEv(id){const e=AD().events.find(x=>x.id===id);if(!e)return;const t=e.title+'\n日期：'+e.date+'\n地点：'+([e.hospital,e.department].filter(Boolean).join(' ')||'—')+'\n医生：'+(e.doctor||'—')+'\n备注：'+(e.note||'—');navigator.clipboard?.writeText(t).then(()=>alert('已复制！')).catch(()=>alert(t));}
function delEv(id){if(!confirm('删除此提醒？'))return;const d=AD();d.events=d.events.filter(x=>x.id!==id);saveState();rCalendar();}

// ── 时间线 ────────────────────────────────────────────────────────────
function rTimeline(){
  const {reports,notes,imaging,meds,events}=AD();
  const c=document.getElementById('mc');
  const all=[
    ...reports.map(r=>({...r,_t:'report',_sd:r.date})),
    ...notes.map(n=>({...n,_t:'note',_sd:n.date})),
    ...imaging.map(i=>({...i,_t:'imaging',_sd:i.date})),
    ...meds.filter(m=>m.active).map(m=>({...m,_t:'med',_sd:getRRD(m)})),
    ...events.map(e=>({...e,_t:'event',_sd:e.date}))
  ].sort((a,b)=>b._sd.localeCompare(a._sd));

  if(!all.length){c.innerHTML=`<div class="es">📈<br><br>暂无记录<br><br>上传报告或添加病历后会在这里显示</div>`;return;}

  // 按月分组
  const groups={};
  all.forEach(item=>{
    const month=item._sd.slice(0,7); // YYYY-MM
    if(!groups[month]) groups[month]=[];
    groups[month].push(item);
  });

  const monthNames=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let html='<div style="font-size:11px;color:var(--text3);margin-bottom:12px;">共 '+all.length+' 条记录，按时间倒序排列</div>';

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(month=>{
    const [yr,mo]=month.split('-');
    html+=`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px;">
      <div style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;">${yr}年 ${monthNames[parseInt(mo)]}</div>
      <div style="flex:1;height:0.5px;background:var(--border);"></div>
    </div>`;

    groups[month].forEach((item,i)=>{
      const isFut=item._sd>TS;
      const isLast=i===groups[month].length-1;
      let dot,icon,title,sub,bc='';

      if(item._t==='report'){
        const abn=item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length;
        dot=abn===0?'#9fe1cb':'#fac775';icon='🧪';
        title=esc(item.reportType||'检查报告')+(item.pageCount>1?' ('+item.pageCount+'张)':'');
        sub=(item.hospital?esc(item.hospital)+' · ':'')+( abn===0?'<span style="color:var(--success-text);">全部正常</span>':'<span style="color:var(--warn-text);">'+abn+'项异常</span>');
        bc=abn===0?'bok':abn<=2?'bwarn':'bdanger';
      } else if(item._t==='note'){
        dot='#b5d4f4';icon='🩺';
        title=esc(item.type||'门诊病历')+(item.diagnosis?' — '+esc(item.diagnosis):'');
        sub=(item.hospital?esc(item.hospital)+' · ':'')+( item.doctor?esc(item.doctor)+'医生':'');
        bc='binfo';
      } else if(item._t==='imaging'){
        const abn=(item.findings||[]).filter(f=>f.status!=='ok').length;
        dot=abn===0?'#9fe1cb':'#fac775';icon='🔬';
        title=esc(item.type);
        sub=(item.hospital?esc(item.hospital)+' · ':'')+(abn===0?'<span style="color:var(--success-text);">未见异常</span>':'<span style="color:var(--warn-text);">'+abn+'项需关注</span>');
        bc=abn===0?'bok':'bwarn';
      } else if(item._t==='med'){
        dot='#afa9ec';icon='💊';
        title='开药提醒：'+esc(item.name);
        sub='约剩 '+getDays(item)+' 天用完，建议此前开药';
        bc='bpurple';
      } else {
        dot=isFut?'#fac775':'#d3d1c7';
        icon=item.isMedReminder?'💊':'📅';
        title=esc(item.title);
        sub=[item.hospital,item.doctor?item.doctor+'医生':''].filter(Boolean).map(esc).join(' · ');
        bc=isFut?'bwarn':'';
      }

      const dayStr=item._sd.split('-')[2]; // DD
      // 构建详情内容
      let detail = '';
      if(item._t==='report'){
        const warnM=(item.metrics||[]).filter(m=>m.status!=='ok');
        const okM=(item.metrics||[]).filter(m=>m.status==='ok');
        if(item.summary) detail+=`<div class="ai-box" style="margin-bottom:8px;">📋 ${esc(item.summary)}</div>`;
        if(warnM.length) detail+=`<div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;">异常指标</div><div class="mg">${warnM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v warn">${esc(m.value)}</div><div class="mc-r">参考 ${esc(m.reference)} ⚠</div></div>`).join('')}</div>`;
        if(okM.length) detail+=`<div style="font-size:10px;font-weight:600;color:var(--text3);margin:6px 0 4px;">正常（${okM.length}项）</div><div class="mg">${okM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v ok">${esc(m.value)}</div><div class="mc-r">✓</div></div>`).join('')}</div>`;
      } else if(item._t==='note'){
        if(item.content) detail+=`<div style="font-size:12px;line-height:1.7;background:var(--bg2);padding:8px 10px;border-radius:var(--radius);margin-bottom:6px;">${esc(item.content)}</div>`;
        if(item.followUp) detail+=`<div style="font-size:11px;color:var(--warn-text);margin-top:4px;">⏰ 复查：${esc(item.followUp)}</div>`;
      } else if(item._t==='imaging'){
        const findings=item.findings||[];
        if(findings.length) detail+=`<div style="border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;margin-bottom:6px;">${findings.map(f=>{const dc=f.status==='ok'?'#9fe1cb':f.status==='warn'?'#fac775':'#e24b4a';const label=f.status==='ok'?'正常':f.status==='warn'?'异常':'需关注';return`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);"><div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;margin-top:2px;"><div style="width:8px;height:8px;border-radius:50%;background:${dc};"></div>${f.status!=='ok'?`<div style="font-size:9px;color:${dc};font-weight:500;">${label}</div>`:''}</div><div><div style="font-size:12px;font-weight:500;">${esc(f.location)}</div><div style="font-size:11px;color:var(--text2);">${esc(f.desc)}</div></div></div>`;}).join('')}</div>`;
        if(item.conclusion) detail+=`<div style="font-size:12px;background:var(--bg2);padding:8px 10px;border-radius:var(--radius);line-height:1.7;">${esc(item.conclusion)}</div>`;
        if(item.suggestion) detail+=`<div style="font-size:11px;color:var(--warn-text);margin-top:6px;">💡 建议：${esc(item.suggestion)}</div>`;
      } else if(item._t==='event'){
        if(item.note) detail+=`<div style="font-size:12px;color:var(--text2);">${esc(item.note)}</div>`;
      }

      const tlId='tl_'+item.id;
      html+=`<div style="display:flex;gap:10px;margin-bottom:8px;">
        <div style="display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--bg2);border:2px solid ${dot};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">${icon}</div>
          ${!isLast?'<div style="width:1.5px;background:var(--border);flex:1;margin-top:3px;min-height:8px;"></div>':''}
        </div>
        <div style="flex:1;padding-bottom:4px;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px;">${item._sd}${isFut&&item._t!=='report'&&item._t!=='note'&&item._t!=='imaging'?' · <span style="color:var(--warn-text);">待办</span>':''}</div>
          <div style="border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;background:var(--bg);" onclick="tlToggle(this,'${tlId}')">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <div style="font-size:13px;font-weight:500;flex:1;">${title}</div>
              <div style="display:flex;align-items:center;gap:6px;">
                ${bc?`<span class="badge ${bc}" style="flex-shrink:0;">${item._t==='report'?(item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length)===0?'正常':(item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length)+'项异常':item._t==='note'?esc(item.department||'病历'):item._t==='imaging'?((item.findings||[]).filter(f=>f.status!=='ok').length===0?'未见异常':(item.findings||[]).filter(f=>f.status!=='ok').length+'项需关注'):item._t==='med'?'开药提醒':isFut?'待办':'已完成'}</span>`:''}
                ${detail?'<span style="font-size:10px;color:var(--text3);" class="tl-arrow">▼</span>':''}
              </div>
            </div>
            ${sub?`<div style="font-size:11px;color:var(--text2);margin-top:3px;">${sub}</div>`:''}
            ${detail?`<div id="${tlId}" style="display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;">${detail}</div>`:''}
          </div>
        </div>
      </div>`;
    });
  });

  c.innerHTML=html;
}

const SYMPTOM_TAGS = {
  '症状': ['头痛','头晕','恶心','腹痛','腹泻','胸闷','气短','咳嗽','发烧','乏力','关节痛','皮疹','食欲差'],
  '睡眠': ['入睡困难','早醒','多梦','睡眠浅','嗜睡','睡眠良好'],
  '情绪': ['焦虑','低落','烦躁','平静','开心','压力大','疲惫'],
  '精力': ['精力充沛','状态一般','精力不足','极度疲倦'],
  '饮食': ['食欲好','食欲差','暴饮暴食','消化不良','饮水不足']
};

const LEVEL_COLORS = ['#9fe1cb','#fac775','#e24b4a'];
const LEVEL_LABELS = ['轻微','中等','严重'];

function rFeelings(){
  const feelings = AD().feelings||[];
  const c = document.getElementById('mc');

  let html = `<button class="btn-p" style="width:100%;margin-bottom:12px;" onclick="showAddFeeling()">＋ 记录今日感受</button>`;

  if(!feelings.length){
    html += `<div class="es">💬<br><br>暂无感受记录<br><div style="font-size:12px;margin-top:8px;color:var(--text3);">记录每天的身体和心理状态<br>帮助发现健康规律</div></div>`;
    c.innerHTML = html; return;
  }

  // 按日期分组
  const groups = {};
  feelings.forEach(f => {
    const d = f.date.slice(0,7);
    if(!groups[d]) groups[d] = [];
    groups[d].push(f);
  });

  const monthNames = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(month => {
    const [yr,mo] = month.split('-');
    html += `<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px;">
      <div style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;">${yr}年 ${monthNames[parseInt(mo)]}</div>
      <div style="flex:1;height:0.5px;background:var(--border);"></div>
    </div>`;

    groups[month].sort((a,b)=>b.date.localeCompare(a.date)).forEach(f => {
      const tags = f.tags||[];
      const hasWarn = tags.some(t=>t.level>=1);
      const dot = hasWarn ? '#fac775' : '#9fe1cb';

      html += `<div class="card cp" onclick="this.classList.toggle('open')" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--bg2);border:2px solid ${dot};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">💬</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:500;">${f.date} <span style="font-size:11px;font-weight:400;color:var(--text2);">${tags.length}项记录</span></div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;">
              ${tags.slice(0,4).map(t=>`<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:${LEVEL_COLORS[t.level||0]}22;color:${LEVEL_COLORS[t.level||0]};border:0.5px solid ${LEVEL_COLORS[t.level||0]};">${t.name}</span>`).join('')}
              ${tags.length>4?`<span style="font-size:10px;color:var(--text3);">+${tags.length-4}</span>`:''}
            </div>
          </div>
          <span style="font-size:10px;color:var(--text3);">▼</span>
        </div>
        <div class="db" style="margin-top:10px;">
          ${Object.keys(SYMPTOM_TAGS).map(cat => {
            const catTags = tags.filter(t=>t.cat===cat);
            if(!catTags.length) return '';
            return `<div style="margin-bottom:8px;">
              <div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;">${cat}</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap;">
                ${catTags.map(t=>`<span style="font-size:11px;padding:2px 9px;border-radius:20px;background:${LEVEL_COLORS[t.level||0]}22;color:${LEVEL_COLORS[t.level||0]};border:0.5px solid ${LEVEL_COLORS[t.level||0]};">${t.name}${t.level>0?' ('+LEVEL_LABELS[t.level]+')':''}</span>`).join('')}
              </div>
            </div>`;
          }).join('')}
          ${f.note?`<div style="background:var(--bg2);border-radius:var(--radius);padding:8px 10px;font-size:12px;line-height:1.7;color:var(--text2);margin-top:6px;">📝 ${esc(f.note)}</div>`:''}
          <div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn-o" onclick="event.stopPropagation();delItem('feelings','${f.id}')">🗑 删除</button>
          </div>
        </div>
      </div>`;
    });
  });

  c.innerHTML = html;
}

function showAddFeeling(){
  const today = new Date().toISOString().split('T')[0];
  // 构建标签选择器
  let tagPickerHtml = '';
  Object.keys(SYMPTOM_TAGS).forEach(cat => {
    tagPickerHtml += `<div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;">${cat}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;" id="cat_${cat}">
        ${SYMPTOM_TAGS[cat].map(tag =>
          `<div onclick="toggleFeelTag(this,'${cat}','${tag}')"
            data-cat="${cat}" data-tag="${tag}" data-level="0" data-active="0"
            style="font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg2);color:var(--text);">${tag}</div>`
        ).join('')}
      </div>
    </div>`;
  });

  showOverlay(`<div class="dialog" style="max-width:400px;">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:10px;">记录今日感受</h3>
    <label class="fl">日期</label>
    <input type="date" id="feelDate" value="${today}">
    <label class="fl" style="margin-top:10px;">选择症状（点一次=轻微，再点=中等，再点=严重，再点=取消）</label>
    <div style="margin-top:6px;">${tagPickerHtml}</div>
    <label class="fl">补充说明（选填）</label>
    <textarea id="feelNote" rows="2" placeholder="比如：头痛从下午开始，可能是睡眠不足导致的…"></textarea>
    <div class="rb"><button class="btn-p" onclick="saveFeeling()" style="flex:1;">保存记录</button><button class="btn-o" onclick="closeOverlay()">取消</button></div>
  </div>`);
}

function toggleFeelTag(el, cat, tag){
  const level = parseInt(el.dataset.level||'0');
  const newLevel = (level + 1) % 4; // 0=未选, 1=轻微, 2=中等, 3=严重, 回到0=取消
  el.dataset.level = newLevel;
  el.dataset.active = newLevel > 0 ? '1' : '0';
  if(newLevel === 0){
    el.style.background = 'var(--bg2)';
    el.style.color = 'var(--text)';
    el.style.borderColor = 'var(--border2)';
    el.textContent = tag;
  } else {
    const col = LEVEL_COLORS[newLevel-1];
    el.style.background = col+'22';
    el.style.color = col;
    el.style.borderColor = col;
    el.textContent = tag + ' ' + LEVEL_LABELS[newLevel-1];
  }
}

function saveFeeling(){
  const date = document.getElementById('feelDate').value;
  if(!date){alert('请选择日期');return;}
  const tags = [];
  document.querySelectorAll('[data-active="1"]').forEach(el => {
    tags.push({
      cat: el.dataset.cat,
      name: el.dataset.tag,
      level: parseInt(el.dataset.level)-1  // 存0=轻微,1=中等,2=严重
    });
  });
  if(!tags.length && !document.getElementById('feelNote').value.trim()){
    alert('请至少选择一个症状或填写说明');return;
  }
  const f = {id:uid(), date, tags, note: document.getElementById('feelNote').value.trim()};
  if(!AD().feelings) AD().feelings = [];
  AD().feelings.unshift(f);
  saveState(); renderSidebar(); closeOverlay();
  // 跳转时间线
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  CT='feelings'; rFeelings();
}

function rTimeline(){
  const {reports,notes,imaging,meds,events,feelings}=AD();
  const c=document.getElementById('mc');
  const m=state.members.find(x=>x.id===CM);
  const memberTags=(m&&m.tags)||[];

  // 当前选中的筛选标签
  if(!window._tlFilter) window._tlFilter='all';

  const all=[
    ...reports.map(r=>({...r,_t:'report',_sd:r.date})),
    ...notes.map(n=>({...n,_t:'note',_sd:n.date})),
    ...imaging.map(i=>({...i,_t:'imaging',_sd:i.date})),
    ...meds.filter(m=>m.active).map(m=>({...m,_t:'med',_sd:getRRD(m)})),
    ...events.map(e=>({...e,_t:'event',_sd:e.date})),
    ...(feelings||[]).map(f=>({...f,_t:'feeling',_sd:f.date}))
  ].sort((a,b)=>b._sd.localeCompare(a._sd));

  if(!all.length){c.innerHTML=`<div class="es">📈<br><br>暂无记录<br><div style="font-size:12px;margin-top:8px;color:var(--text3);">上传报告或添加病历后会在这里显示</div></div>`;return;}

  // 筛选逻辑：按类型筛选
  const typeFilters=[
    {key:'all',label:'全部',icon:''},
    {key:'abnormal',label:'异常追踪',icon:'⚠️'},
    {key:'report',label:'检查报告',icon:'🧪'},
    {key:'note',label:'病历',icon:'🩺'},
    {key:'imaging',label:'影像',icon:'🔬'},
    {key:'feeling',label:'感受',icon:'💬'},
    {key:'med',label:'用药',icon:'💊'},
    {key:'event',label:'日历',icon:'📅'},
  ];

  // 异常追踪单独处理
  if(window._tlFilter==='abnormal'){rAbnormalTracking();return;}

  const filtered = window._tlFilter==='all' ? all : all.filter(x=>x._t===window._tlFilter);

  // 按月分组
  const groups={};
  filtered.forEach(item=>{
    const month=item._sd.slice(0,7);
    if(!groups[month]) groups[month]=[];
    groups[month].push(item);
  });

  const monthNames=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // 筛选栏
  let html=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--border);">
    ${typeFilters.map(f=>`<div onclick="window._tlFilter='${f.key}';rTimeline();" style="font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:0.5px solid ${window._tlFilter===f.key?'var(--text)':'var(--border2)'};background:${window._tlFilter===f.key?'var(--text)':'var(--bg2)'};color:${window._tlFilter===f.key?'var(--bg)':'var(--text2)'};">${f.icon} ${f.label}</div>`).join('')}
  </div>`;

  // 健康标签筛选（只有有标签时才显示）
  if(memberTags.length){
    html+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;">
      <span style="font-size:10px;color:var(--text3);">标签：</span>
      ${memberTags.map(t=>`<div onclick="tlTagFilter('${esc(t)}')" id="tltag_${esc(t)}" style="font-size:11px;padding:2px 9px;border-radius:20px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);">${esc(t)}</div>`).join('')}
    </div>`;
  }

  html+=`<div style="font-size:11px;color:var(--text3);margin-bottom:10px;">共 ${filtered.length} 条记录</div>`;

  if(!filtered.length){
    html+=`<div class="es">🔍<br><br>没有符合条件的记录</div>`;
    c.innerHTML=html; return;
  }

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(month=>{
    const [yr,mo]=month.split('-');
    html+=`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px;">
      <div style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;">${yr}年 ${monthNames[parseInt(mo)]}</div>
      <div style="flex:1;height:0.5px;background:var(--border);"></div>
    </div>`;

    groups[month].forEach((item,i)=>{
      const isFut=item._sd>TS;
      const isLast=i===groups[month].length-1;
      let dot,icon,title,sub,bc='',detail='';

      if(item._t==='report'){
        const abn=item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length;
        dot=abn===0?'#9fe1cb':'#fac775';icon='🧪';
        title=esc(item.reportType||'检查报告')+(item.pageCount>1?' ('+item.pageCount+'张)':'');
        sub=[item.hospital,item.date].filter(Boolean).map(esc).join(' · ');
        bc=abn===0?'bok':abn<=2?'bwarn':'bdanger';
        const warnM=(item.metrics||[]).filter(m=>m.status!=='ok');
        const okM=(item.metrics||[]).filter(m=>m.status==='ok');
        if(item.summary) detail+=`<div class="ai-box" style="margin-bottom:8px;">📋 ${esc(item.summary)}</div>`;
        if(warnM.length) detail+=`<div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;">异常指标</div><div class="mg">${warnM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v warn">${esc(m.value)}</div><div class="mc-r">参考 ${esc(m.reference)}</div></div>`).join('')}</div>`;
        if(okM.length) detail+=`<div style="font-size:10px;color:var(--text3);margin:4px 0 3px;">正常（${okM.length}项）</div><div class="mg">${okM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v ok">${esc(m.value)}</div><div class="mc-r">✓</div></div>`).join('')}</div>`;
      } else if(item._t==='note'){
        dot='#b5d4f4';icon='🩺';
        title=esc(item.type||'门诊病历')+(item.diagnosis?' — '+esc(item.diagnosis):'');
        sub=[item.hospital,item.date,item.doctor?item.doctor+'医生':''].filter(Boolean).map(esc).join(' · ');
        bc='binfo';

function tlTagFilter(tag){
  // 按标签筛选：在所有记录里找包含该标签关键词的
  // 先重置类型筛选
  window._tlFilter='all';
  window._tlTagFilter = window._tlTagFilter===tag ? null : tag;
  // 重新渲染（简化版：高亮提示用户该功能在开发中）
  // 实际筛选：找诊断/内容包含标签关键词的记录
  rTimeline();
  // 高亮选中的标签
  document.querySelectorAll('[id^="tltag_"]').forEach(el=>{
    const isActive = el.id === 'tltag_'+tag && window._tlTagFilter===tag;
    el.style.background = isActive ? '#eeedfe' : 'var(--bg2)';
    el.style.color = isActive ? '#534ab7' : 'var(--text2)';
    el.style.borderColor = isActive ? '#534ab7' : 'var(--border2)';
  });
}

function showBatchImport(type){
  const typeNames = {reports:'检查报告', notes:'病历记录', imaging:'影像报告'};
  const typeName = typeNames[type]||type;
  showOverlay(`<div class="dialog" style="max-width:420px;">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:4px;">📦 批量导入${typeName}</h3>
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px;">一次选多张图片，AI 逐张识别后自动保存</div>
    <input type="file" accept="image/*" multiple id="batchFileInput" style="margin-bottom:10px;" onchange="onBatchFiles(event,'${type}')">
    <div id="batchPreviewGrid" class="img-grid" style="min-height:44px;"></div>
    <div id="batchStatus" style="font-size:12px;color:var(--text2);margin:8px 0;"></div>
    <div id="batchResults" style="max-height:300px;overflow-y:auto;"></div>
    <div class="rb">
      <button class="btn-p" id="batchStartBtn" onclick="startBatchImport('${type}')" style="flex:1;display:none;">🤖 开始批量识别</button>
      <button class="btn-o" onclick="closeOverlay()">关闭</button>
    </div>
  </div>`);
}

let _batchFiles = [];

function onBatchFiles(e, type){
  _batchFiles = Array.from(e.target.files||[]).filter(f=>f.type.startsWith('image/'));
  const grid = document.getElementById('batchPreviewGrid');
  const status = document.getElementById('batchStatus');
  const btn = document.getElementById('batchStartBtn');
  if(!grid||!_batchFiles.length) return;

  grid.innerHTML = '';
  _batchFiles.forEach(function(f,i){
    const url = URL.createObjectURL(f);
    const div = document.createElement('div');
    div.className = 'img-thumb-wrap';
    div.id = 'batch_thumb_'+i;
    div.innerHTML = '<img class="img-thumb" src="'+url+'" alt="">'
      +'<div class="img-rm" id="batch_status_'+i+'" style="background:var(--bg2);color:var(--text3);font-size:9px;width:18px;height:18px;">⏳</div>';
    grid.appendChild(div);
  });

  if(status) status.textContent = _batchFiles.length + '张图片已选，点击开始识别';
  if(btn) btn.style.display = 'block';
}

async function startBatchImport(type){
  if(!_batchFiles.length) return;
  const btn = document.getElementById('batchStartBtn');
  if(btn) btn.style.display = 'none';
  const status = document.getElementById('batchStatus');
  const results = document.getElementById('batchResults');
  if(results) results.innerHTML = '';

  let saved = 0, failed = 0;

  for(let i=0; i<_batchFiles.length; i++){
    const f = _batchFiles[i];
    const statusDot = document.getElementById('batch_status_'+i);
    if(status) status.textContent = '正在识别第 '+(i+1)+' / '+_batchFiles.length+' 张：'+f.name;
    if(statusDot) { statusDot.textContent='⏳'; statusDot.style.background='var(--bg2)'; }

    try {
      const {b64, mime} = await readFile(f);
      let parsed;

      if(type==='reports'){
        const prompt = '请仔细识别这张医疗检查报告图片。只输出JSON，不要任何markdown，第一个字符必须是{：'
          +'{"reportType":"报告类型名称","date":"检查日期YYYY-MM-DD","hospital":"医院名称","summary":"2-3句分析总结","abnormalCount":数字,'
          +'"metrics":[{"name":"指标全称（英文缩写）","value":"数值+单位","reference":"参考范围","status":"ok或warn或danger"}]}'
          +'。把所有指标都列出来。无法识别返回{"error":"原因"}';
        parsed = await callAI(b64, mime, prompt);
        if(!parsed._raw && !parsed.error){
          const r = {...parsed, id:uid(), date:parsed.date||TS, pageCount:1};
          AD().reports.unshift(r);
          saved++;
          if(statusDot){statusDot.textContent='✅';statusDot.style.background='#1d9e75';}
          if(results) results.innerHTML += '<div style="font-size:11px;padding:4px 6px;border-bottom:0.5px solid var(--border);color:var(--success-text);">✅ '+f.name+' → '+(parsed.reportType||'报告')+' '+( parsed.date||'')+'</div>';
        } else {
          throw new Error(parsed.error||'识别失败');
        }

      } else if(type==='notes'){
        const prompt = '请识别这张医疗病历图片。只输出JSON，不要markdown，第一个字符必须是{：'
          +'{"type":"门诊病历或住院记录或急诊记录或复诊记录","date":"YYYY-MM-DD","hospital":"医院","department":"科室","doctor":"医生","diagnosis":"主要诊断","content":"病历内容完整文字","followUp":"复查要求","medications":"开具药物"}'
          +'。无法识别返回{"error":"原因"}';
        parsed = await callAI(b64, mime, prompt);
        if(!parsed._raw && !parsed.error){
          const n = {...parsed, id:uid()};
          AD().notes.unshift(n);
          saved++;
          if(statusDot){statusDot.textContent='✅';statusDot.style.background='#1d9e75';}
          if(results) results.innerHTML += '<div style="font-size:11px;padding:4px 6px;border-bottom:0.5px solid var(--border);color:var(--success-text);">✅ '+f.name+' → '+(parsed.diagnosis||'病历')+' '+(parsed.date||'')+'</div>';
        } else {
          throw new Error(parsed.error||'识别失败');
        }

      } else if(type==='imaging'){
        const prompt = '请识别这张医疗影像报告图片。只输出JSON，不要markdown，第一个字符必须是{：'
          +'{"type":"影像类型","hospital":"医院","department":"科室","doctor":"医生","date":"YYYY-MM-DD",'
          +'"findings":[{"location":"部位","status":"ok或warn或danger","desc":"所见描述"}],'
          +'"conclusion":"结论原文","suggestion":"复查建议"}'
          +'。有异常必须标warn/danger。无法识别返回{"error":"原因"}';
        parsed = await callAI(b64, mime, prompt);
        if(!parsed._raw && !parsed.error){
          const img = {...parsed, id:uid(), date:parsed.date||TS};
          AD().imaging.unshift(img);
          saved++;
          if(statusDot){statusDot.textContent='✅';statusDot.style.background='#1d9e75';}
          if(results) results.innerHTML += '<div style="font-size:11px;padding:4px 6px;border-bottom:0.5px solid var(--border);color:var(--success-text);">✅ '+f.name+' → '+(parsed.type||'影像')+' '+(parsed.date||'')+'</div>';
        } else {
          throw new Error(parsed.error||'识别失败');
        }
      }

    } catch(err) {
      failed++;
      if(statusDot){statusDot.textContent='❌';statusDot.style.background='#e24b4a';}
      if(results) results.innerHTML += '<div style="font-size:11px;padding:4px 6px;border-bottom:0.5px solid var(--border);color:var(--danger-text);">❌ '+f.name+' → '+err.message.slice(0,50)+'</div>';
    }

    // 每张识别完立刻保存
    saveState(); renderSidebar();
  }

  if(status) status.textContent = '完成！成功 '+saved+' 张，失败 '+failed+' 张';
  // 刷新当前页面
  rt(type);
}

const CHECKIN_NORMAL = {
  sbp: [90, 140],   // 收缩压
  dbp: [60, 90],    // 舒张压
  hr:  [50, 100],   // 心率
  bsgf: [3.9, 6.1], // 血糖空腹
  bspp: [3.9, 7.8], // 血糖餐后
  weight: [0, 999]
};

function valColor(key, val){
  const r = CHECKIN_NORMAL[key];
  if(!r || !val) return 'var(--text)';
  return (val >= r[0] && val <= r[1]) ? 'var(--success-text)' : 'var(--danger-text)';
}

function rCheckin(){
  const c = document.getElementById('mc');
  const checkins = AD().checkins||[];
  const today = TS;

  const reminderTime = localStorage.getItem('checkin_reminder_'+CM)||'';

  // 今日打卡卡片

  <div class="af" style="margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3 style="font-size:14px;font-weight:600;">📊 今日健康打卡</h3>
      <span style="font-size:11px;color:var(--text3);">${today}</span>
    </div>
    ${todayRec ? `<div style="background:var(--success-bg);color:var(--success-text);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:10px;">✅ 今日已打卡</div>` : ''}

    <span style="font-size:13px;">⏰</span>
    <span style="font-size:12px;color:var(--text2);flex:1;">每日打卡提醒</span>

    html += checkins.slice(0, 30).map(r => `
      <div class="card cp" onclick="this.classList.toggle('open')" style="margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:11px;color:var(--text3);min-width:80px;">${r.date}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;flex:1;">
            ${r.sbp?`<span style="font-size:12px;color:${valColor('sbp',r.sbp)};">血压 ${r.sbp}/${r.dbp}</span>`:''}
            ${r.bsgf?`<span style="font-size:12px;color:${valColor('bsgf',r.bsgf)};">空腹血糖 ${r.bsgf}</span>`:''}

function renderCheckinCard(r, compact){
  const items = [
    {label:'收缩压', val:r.sbp, unit:'mmHg', key:'sbp'},
    {label:'舒张压', val:r.dbp, unit:'mmHg', key:'dbp'},
    {label:'心率', val:r.hr, unit:'次/分', key:'hr'},
    {label:'空腹血糖', val:r.bsgf, unit:'mmol/L', key:'bsgf'},
    {label:'餐后血糖', val:r.bspp, unit:'mmol/L', key:'bspp'},
    {label:'体重', val:r.weight, unit:'kg', key:'weight'},
  ].filter(x=>x.val);

  if(!items.length) return '<div style="font-size:12px;color:var(--text3);">暂无数据</div>';

  return `<div class="mg" style="margin-top:${compact?'10px':'0'};">
    ${items.map(x=>`<div class="mc">
      <div class="mc-n">${x.label}</div>
      <div class="mc-v" style="color:${valColor(x.key,x.val)};">${x.val} <span style="font-size:10px;font-weight:400;">${x.unit}</span></div>
      <div class="mc-r">${(function(){const r=CHECKIN_NORMAL[x.key];if(!r)return'';if(x.val<r[0])return'⬇ 偏低';if(x.val>r[1])return'⬆ 偏高';return'✓ 正常';})()}</div>
    </div>`).join('')}
  </div>${r.medTaken!==undefined?`<div style="font-size:11px;margin-top:6px;color:var(--text2);">💊 今日用药：${r.medTaken?'✅ 已服用':'❌ 未服用'}</div>`:''}
  ${r.note?`<div style="font-size:11px;margin-top:4px;color:var(--text2);">📝 ${esc(r.note)}</div>`:''}`;
}

function renderTrendChart(data){
  // 简单 SVG 折线图
  const W=320, H=120, PAD=32;
  const chartW=W-PAD*2, chartH=H-PAD;

  // 血压趋势
  const sbpVals = data.map(d=>parseFloat(d.sbp)||null);
  const hasBlood = sbpVals.some(v=>v!==null);
  if(!hasBlood) return '';

  const validSbp = sbpVals.filter(v=>v!==null);
  const minV = Math.min(...validSbp)-10;
  const maxV = Math.max(...validSbp)+10;
  const n = data.length;

  function x(i){ return PAD + (i/(n-1))*chartW; }
  function y(v){ return PAD + (1-(v-minV)/(maxV-minV))*chartH; }

  // 生成折线点
  let sbpPath='', dbpPath='';
  data.forEach((d,i)=>{
    if(d.sbp){
      const px=x(i), py=y(parseFloat(d.sbp));
      sbpPath+=(i===0||!data.slice(0,i).some(x=>x.sbp)?'M':'L')+px+','+py+' ';
    }
    if(d.dbp){
      const px=x(i), py=y(parseFloat(d.dbp));
      dbpPath+=(i===0||!data.slice(0,i).some(x=>x.dbp)?'M':'L')+px+','+py+' ';
    }
  });

  // 正常范围参考线
  const refHigh = y(140), refLow = y(90);

  return `<div style="margin-bottom:14px;">
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;">血压趋势（近${data.length}天）</div>
    <div style="overflow-x:auto;">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;">
      <!-- 背景 -->
      <rect x="${PAD}" y="${PAD}" width="${chartW}" height="${chartH}" fill="none" stroke="var(--border)" stroke-width="0.5"/>
      <!-- 正常范围 -->
      <rect x="${PAD}" y="${refHigh}" width="${chartW}" height="${refLow-refHigh}" fill="#9fe1cb" opacity="0.15"/>
      <line x1="${PAD}" y1="${refHigh}" x2="${PAD+chartW}" y2="${refHigh}" stroke="#9fe1cb" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="${PAD}" y1="${refLow}" x2="${PAD+chartW}" y2="${refLow}" stroke="#9fe1cb" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- 折线 -->
      ${sbpPath?`<path d="${sbpPath}" fill="none" stroke="#e05c45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:''}
      ${dbpPath?`<path d="${dbpPath}" fill="none" stroke="#534ab7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:''}
      <!-- 数据点 -->
      ${data.map((d,i)=>d.sbp?`<circle cx="${x(i)}" cy="${y(parseFloat(d.sbp))}" r="3" fill="#e05c45"/>`:'').join('')}
      ${data.map((d,i)=>d.dbp?`<circle cx="${x(i)}" cy="${y(parseFloat(d.dbp))}" r="3" fill="#534ab7"/>`:'').join('')}
      <!-- 日期标签 -->
      ${data.filter((_,i)=>i===0||i===Math.floor(n/2)||i===n-1).map((d,_,arr)=>{
        const i=data.indexOf(d);

function saveCheckin(date){
  const sbp = document.getElementById('ci_sbp')?.value;
  const dbp = document.getElementById('ci_dbp')?.value;
  const hr  = document.getElementById('ci_hr')?.value;
  const bsgf= document.getElementById('ci_bsgf')?.value;
  const bspp= document.getElementById('ci_bspp')?.value;
  const weight=document.getElementById('ci_weight')?.value;
  const note= document.getElementById('ci_note')?.value;
  const medTaken= document.querySelector('input[name="ci_med"]:checked')?.value;

  if(!sbp&&!dbp&&!bsgf&&!weight){alert('请至少填写一项数据');return;}

  const rec = {
    date,
    sbp:sbp?parseFloat(sbp):null,
    dbp:dbp?parseFloat(dbp):null,
    hr: hr?parseFloat(hr):null,
    bsgf:bsgf?parseFloat(bsgf):null,
    bspp:bspp?parseFloat(bspp):null,
    weight:weight?parseFloat(weight):null,
    medTaken:medTaken!==undefined?(medTaken==='1'):undefined,
    note:note||''
  };

  // 去掉 null
  Object.keys(rec).forEach(k=>{ if(rec[k]===null) delete rec[k]; });

  if(!AD().checkins) AD().checkins=[];
  const idx = AD().checkins.findIndex(x=>x.date===date);
  if(idx>=0) AD().checkins[idx]=rec;
  else AD().checkins.unshift(rec);
  AD().checkins.sort((a,b)=>b.date.localeCompare(a.date));

  saveState(); closeOverlay(); rCheckin();

  // 异常提醒
  const warns=[];
  if(rec.sbp && (rec.sbp>140||rec.sbp<90)) warns.push('收缩压'+rec.sbp+'mmHg');
  if(rec.dbp && (rec.dbp>90||rec.dbp<60)) warns.push('舒张压'+rec.dbp+'mmHg');
  if(rec.bsgf && (rec.bsgf>6.1||rec.bsgf<3.9)) warns.push('空腹血糖'+rec.bsgf+'mmol/L');
  if(warns.length) setTimeout(()=>alert('⚠️ 注意：'+warns.join('、')+'超出正常范围，建议关注并咨询医生。'),300);
}

async function doVisitAI(){
  const files = (window._imgStore||{})['visit_imgs']||[];
  if(!files.length){alert('请先选择图片');return;}
  const st = document.getElementById('visit_ai_status');
  if(st) st.textContent='⏳ AI 识别中…';

  // 统一 prompt，让 AI 自动判断图片类型并返回完整就诊信息
  const prompt = '请识别这张医疗图片（可能是检查报告/病历/影像报告）。'
    +'只输出JSON，不要markdown，第一个字符必须是{：'
    +'{"imgType":"report或note或imaging","date":"YYYY-MM-DD","hospital":"医院","department":"科室","doctor":"医生",'
    +'"diagnosis":"主要诊断","content":"病历内容（病历图片才有）","medications":"开具药物","followUp":"复查要求",'
    +'"conclusion":"影像结论（影像图片才有）","suggestion":"影像建议",'
    +'"metrics":[{"name":"指标名","value":"值+单位","reference":"参考范围","status":"ok或warn或danger"}],'
    +'"findings":[{"location":"部位","status":"ok或warn或danger","desc":"所见描述"}]}'
    +'。检查报告的findings为空数组，影像报告的metrics为空数组，病历的metrics和findings都为空数组。'
    +'有异常必须如实标注warn/danger。无法识别返回{"error":"原因"}';

  try {
    const allMetrics = {}, allFindings = [];
    let mainInfo = {};
    let recognized = 0;

    for(let i=0;i<files.length;i++){
      if(st) st.textContent=`⏳ 正在识别第${i+1}/${files.length}张…`;
      const {b64,mime} = await readFile(files[i]);
      try{
        const r = await callAI(b64, mime, prompt);
        if(r._raw||r.error) continue;
        recognized++;
        // 取第一张有效图片的基本信息
        if(!mainInfo.date && r.date) mainInfo = r;
        // 合并指标（去重取最后）
        (r.metrics||[]).forEach(m=>{ allMetrics[m.name]=m; });
        // 合并影像所见
        (r.findings||[]).forEach(f=>{
          if(!allFindings.find(x=>x.location===f.location)) allFindings.push(f);
        });
        // 合并病历内容
        if(r.content && !mainInfo._content) mainInfo._content = r.content;
        if(r.medications && !mainInfo._meds) mainInfo._meds = r.medications;
        if(r.followUp && !mainInfo._followUp) mainInfo._followUp = r.followUp;
        if(r.conclusion && !mainInfo._conclusion) mainInfo._conclusion = r.conclusion;
        if(r.suggestion && !mainInfo._suggestion) mainInfo._suggestion = r.suggestion;
        if(r.diagnosis && !mainInfo.diagnosis) mainInfo.diagnosis = r.diagnosis;
      }catch(e){ console.log('识别失败',e); }
    }

    if(!recognized){if(st) st.textContent='❌ 识别失败，请手动填写';return;}

    // 填入表单
    if(mainInfo.date) document.getElementById('vt_date').value=mainInfo.date;
    if(mainInfo.hospital) document.getElementById('vt_hosp').value=mainInfo.hospital;
    if(mainInfo.department) document.getElementById('vt_dept').value=mainInfo.department;
    if(mainInfo.doctor) document.getElementById('vt_doc').value=mainInfo.doctor;
    if(mainInfo.diagnosis) document.getElementById('vt_diag').value=mainInfo.diagnosis;
    if(mainInfo._content) document.getElementById('vt_content').value=mainInfo._content;
    if(mainInfo._meds) document.getElementById('vt_meds').value=mainInfo._meds;
    if(mainInfo._followUp||mainInfo._suggestion) document.getElementById('vt_followup').value=mainInfo._followUp||mainInfo._suggestion;

    // 存到临时变量供 saveVisit 使用
    window._visitMetrics = Object.values(allMetrics);
    window._visitFindings = allFindings;
    window._visitConclusion = mainInfo._conclusion||'';

    const abn = Object.values(allMetrics).filter(m=>m.status!=='ok').length + allFindings.filter(f=>f.status!=='ok').length;
    if(st) st.textContent=`✅ 识别完成（${files.length}张）${abn>0?'，发现'+abn+'项异常':''} ，请检查后保存`;

  }catch(err){
    if(st) st.textContent='❌ 错误：'+err.message;
  }
}

let _batchVisitFiles=[];
function onBatchVisitFiles(e){
  _batchVisitFiles=Array.from(e.target.files||[]).filter(f=>f.type.startsWith('image/'));
  const grid=document.getElementById('batchVisitGrid');
  const st=document.getElementById('batchVisitStatus');
  const btn=document.getElementById('batchVisitBtn');
  if(!grid||!_batchVisitFiles.length)return;
  grid.innerHTML='';
  _batchVisitFiles.forEach(function(f,i){
    const url=URL.createObjectURL(f);
    const div=document.createElement('div');
    div.className='img-thumb-wrap';
    div.innerHTML='<img class="img-thumb" src="'+url+'" alt=""><div class="img-rm" id="bvs_'+i+'" style="background:var(--bg2);color:var(--text3);font-size:9px;width:18px;height:18px;">⏳</div>';
    grid.appendChild(div);
  });
  if(st) st.textContent=_batchVisitFiles.length+'张图片已选，点击开始识别';
  if(btn) btn.style.display='block';

async function startBatchVisit(){
  if(!_batchVisitFiles.length)return;
  const btn=document.getElementById('batchVisitBtn');
  if(btn) btn.style.display='none';
  const st=document.getElementById('batchVisitStatus');
  const res=document.getElementById('batchVisitResults');
  if(res) res.innerHTML='';

  const prompt='请识别这张医疗图片（检查报告/病历/影像）。'
    +'只输出JSON，不要markdown：'
    +'{"imgType":"report或note或imaging","date":"YYYY-MM-DD","hospital":"医院","department":"科室","doctor":"医生",'
    +'"diagnosis":"主要诊断","content":"病历内容","medications":"开具药物","followUp":"复查要求",'
    +'"conclusion":"影像结论","suggestion":"建议",'
    +'"metrics":[{"name":"指标名","value":"值+单位","reference":"参考范围","status":"ok或warn或danger"}],'
    +'"findings":[{"location":"部位","status":"ok或warn或danger","desc":"所见"}]}'
    +'。无法识别返回{"error":"原因"}';

  // 按日期分组
  const dateGroups={};
  let saved=0, failed=0;

  for(let i=0;i<_batchVisitFiles.length;i++){
    const f=_batchVisitFiles[i];
    const dot=document.getElementById('bvs_'+i);
    if(st) st.textContent='正在识别第'+(i+1)+'/'+_batchVisitFiles.length+'张…';
    if(dot){dot.textContent='⏳';dot.style.background='var(--bg2)';}
    try{
      const {b64,mime}=await readFile(f);
      const r=await callAI(b64,mime,prompt);
      if(r._raw||r.error) throw new Error(r.error||'识别失败');
      const dateKey=r.date||TS;
      if(!dateGroups[dateKey]) dateGroups[dateKey]={date:dateKey,metrics:{},findings:[],info:{}};
      const g=dateGroups[dateKey];
      // 合并信息
      if(r.hospital&&!g.info.hospital) g.info={...r};
      (r.metrics||[]).forEach(m=>{g.metrics[m.name]=m;});
      (r.findings||[]).forEach(f=>{if(!g.findings.find(x=>x.location===f.location))g.findings.push(f);});
      if(r.content&&!g.info.content) g.info.content=r.content;
      if(r.medications&&!g.info.medications) g.info.medications=r.medications;
      if(r.followUp&&!g.info.followUp) g.info.followUp=r.followUp;
      if(r.conclusion&&!g.info.conclusion) g.info.conclusion=r.conclusion;
      if(r.diagnosis&&!g.info.diagnosis) g.info.diagnosis=r.diagnosis;
      if(dot){dot.textContent='✅';dot.style.background='#1d9e75';}
      if(res) res.innerHTML+='<div style="font-size:11px;padding:3px 6px;border-bottom:0.5px solid var(--border);color:var(--success-text);">✅ '+f.name+' → '+(r.date||'未知日期')+' '+esc(r.hospital||'')+'</div>';
    }catch(err){
      failed++;
      if(dot){dot.textContent='❌';dot.style.background='#e24b4a';}
      if(res) res.innerHTML+='<div style="font-size:11px;padding:3px 6px;border-bottom:0.5px solid var(--border);color:var(--danger-text);">❌ '+f.name+' → '+err.message.slice(0,40)+'</div>';
    }
  }

  // 保存每个日期组为一条就诊记录
  if(!AD().visits) AD().visits=[];
  Object.values(dateGroups).forEach(g=>{
    const v={
      id:uid(), date:g.date,
      hospital:g.info.hospital||'', department:g.info.department||'',
      doctor:g.info.doctor||'', diagnosis:g.info.diagnosis||'',
      content:g.info.content||'', medications:g.info.medications||'',
      followUp:g.info.followUp||'', conclusion:g.info.conclusion||'',
      metrics:Object.values(g.metrics), findings:g.findings,
      suggestion:g.info.suggestion||''
    };
    AD().visits.unshift(v);
    saved++;
  });
  AD().visits.sort((a,b)=>b.date.localeCompare(a.date));
  saveState(); renderSidebar();
  if(st) st.textContent='完成！共整理 '+saved+' 条就诊记录，失败 '+failed+' 张';
  rt('visits');
}

// ── 异常指标追踪（时间线里的异常视图） ────────────────────────────────
function rAbnormalTracking(){
  const c = document.getElementById('mc');
  const visits = AD().visits||[];

  // 收集所有历史出现过异常的指标
  const metricHistory = {}; // name -> [{date, value, status, hospital}]
  visits.forEach(v=>{
    (v.metrics||[]).forEach(m=>{
      if(!metricHistory[m.name]) metricHistory[m.name]=[];
      metricHistory[m.name].push({date:v.date, value:m.value, status:m.status, hospital:v.hospital||''});
    });
  });

  // 只保留曾经异常过的指标
  const abnMetrics = {};
  Object.keys(metricHistory).forEach(k=>{
    if(metricHistory[k].some(r=>r.status!=='ok')) abnMetrics[k]=metricHistory[k].sort((a,b)=>a.date.localeCompare(b.date));
  });

  // 影像异常所见
  const findingHistory = {};
  visits.forEach(v=>{
    (v.findings||[]).filter(f=>f.status!=='ok').forEach(f=>{
      if(!findingHistory[f.location]) findingHistory[f.location]=[];
      findingHistory[f.location].push({date:v.date, desc:f.desc, status:f.status, hospital:v.hospital||''});
    });
  });

  if(!Object.keys(abnMetrics).length && !Object.keys(findingHistory).length){
    c.innerHTML=`<div class="es">✅<br><br>暂无异常记录<br><div style="font-size:12px;margin-top:8px;color:var(--text3);">所有检查指标均在正常范围内</div></div>`;
    return;
  }

  let html = `<div style="font-size:11px;color:var(--text3);margin-bottom:12px;">只显示曾经出现异常的指标，追踪变化趋势</div>`;

  // 检查指标异常追踪
  if(Object.keys(abnMetrics).length){
    html += `<div class="sl">⚠️ 异常检查指标追踪（${Object.keys(abnMetrics).length}项）</div>`;
    Object.keys(abnMetrics).forEach(name=>{
      const records = abnMetrics[name];
      const latest = records[records.length-1];
      const isCurrentlyAbn = latest.status!=='ok';
      html += `<div class="card" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;font-weight:600;">${esc(name)}</span>
          <span class="badge ${isCurrentlyAbn?'bwarn':'bok'}">${isCurrentlyAbn?'仍异常':'已恢复'}</span>
        </div>
        <div style="display:flex;gap:0;overflow-x:auto;">
          ${records.map((r,i)=>`<div style="flex-shrink:0;min-width:72px;text-align:center;padding:4px 6px;border-right:0.5px solid var(--border);">
            <div style="font-size:9px;color:var(--text3);margin-bottom:3px;">${r.date}</div>
            <div style="font-size:13px;font-weight:600;color:${r.status!=='ok'?'var(--warn-text)':'var(--success-text)'};">${esc(r.value.split(' ')[0])}</div>
            <div style="font-size:9px;color:var(--text3);">${r.value.split(' ').slice(1).join(' ')}</div>
            <div style="font-size:9px;margin-top:2px;">${r.status!=='ok'?'⚠️':'✓'}</div>
          </div>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px;">来自 ${esc(latest.hospital)} · ${records.length}次记录</div>
      </div>`;
    });
  }

  // 影像异常追踪
  if(Object.keys(findingHistory).length){
    html += `<div class="sl" style="margin-top:14px;">🔬 影像异常所见追踪（${Object.keys(findingHistory).length}处）</div>`;
    Object.keys(findingHistory).forEach(loc=>{
      const records = findingHistory[loc];
      const latest = records[records.length-1];
      html += `<div class="card" style="margin-bottom:8px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${esc(loc)}</div>
        ${records.map(r=>`<div style="padding:6px 0;border-bottom:0.5px solid var(--border);">
          <div style="font-size:10px;color:var(--text3);margin-bottom:2px;">${r.date} · ${esc(r.hospital)}</div>
          <div style="font-size:12px;">${esc(r.desc)}</div>
        </div>`).join('')}
      </div>`;
    });
  }

  c.innerHTML = html;
}

function selectPhType(t, el){
