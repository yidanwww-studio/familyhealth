<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭健康档案</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家庭健康">
<meta name="theme-color" content="#1d9e75">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --info-bg:#e8f2fc;--info-text:#1a5fa8;
  --success-bg:#eaf5e6;--success-text:#2a7a3b;
  --warn-bg:#fef4e0;--warn-text:#8a5a00;
  --danger-bg:#fdecea;--danger-text:#a82a2a;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--info-bg:#0d2d4a;--info-text:#7ab8f5;--success-bg:#0d2d18;--success-text:#6ed68a;--warn-bg:#2d1f00;--warn-text:#f0b040;--danger-bg:#2d0d0d;--danger-text:#f07070;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh;}
.app{display:flex;height:100vh;max-width:1100px;margin:0 auto;background:var(--bg);}
.sidebar{width:64px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;background:var(--bg2);flex-shrink:0;padding:8px 0;}
.sh{display:none;}
.member-list{padding:4px;flex:1;overflow-y:auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mi{display:flex;align-items:center;justify-content:center;padding:4px;border-radius:var(--radius);cursor:pointer;width:48px;height:48px;transition:all 0.15s;position:relative;}
.mi:hover{background:var(--bg);}
.mi.active{background:var(--bg);box-shadow:0 0 0 2px var(--border2);}
.mi.active::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--text);border-radius:2px 0 0 2px;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0;}
.mn{display:none;}
.ms{display:none;}
.add-member{width:40px;height:40px;border:1.5px dashed var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text3);margin:4px auto;}
.add-member:hover{background:var(--bg);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
.topbar-left{min-width:0;flex:1;}
.topbar h2{font-size:15px;font-weight:600;color:var(--text);}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.tag-chip{font-size:10px;padding:1px 7px;border-radius:20px;background:#eeedfe;color:#534ab7;}
.tag-chip.child{background:#e1f5ee;color:#0f6e56;}
.tab-bar{display:flex;gap:2px;padding:6px 12px;border-bottom:0.5px solid var(--border);background:var(--bg2);overflow-x:auto;}
.tab{padding:5px 10px;border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--text2);border:none;background:transparent;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;border:0.5px solid var(--border);}
.content{flex:1;overflow-y:auto;padding:16px;}
.btn-p{background:var(--text);color:var(--bg);border:none;padding:8px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;font-weight:500;}
.btn-p:hover{opacity:0.85;}
.btn-o{border:0.5px solid var(--border2);background:transparent;color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:11px;cursor:pointer;}
.btn-o:hover{background:var(--bg2);}
.card{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:8px;background:var(--bg);}
.card.cp{cursor:pointer;}
.card.cp:hover{border-color:var(--border2);}
.card.open .db{display:block;}
.db{display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-block;}
.bok{background:var(--success-bg);color:var(--success-text);}
.bwarn{background:var(--warn-bg);color:var(--warn-text);}
.bdanger{background:var(--danger-bg);color:var(--danger-text);}
.binfo{background:var(--info-bg);color:var(--info-text);}
.bpurple{background:#eeedfe;color:#534ab7;}
.ok{color:var(--success-text);}
.warn{color:var(--warn-text);}
.danger{color:var(--danger-text);}
.ai-box{background:var(--info-bg);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--info-text);line-height:1.7;margin-bottom:8px;}
.mg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-bottom:8px;}
.mc{background:var(--bg2);border-radius:var(--radius);padding:8px 10px;}
.mc-n{font-size:10px;color:var(--text2);margin-bottom:2px;}
.mc-v{font-size:13px;font-weight:500;}
.mc-r{font-size:10px;color:var(--text3);margin-top:1px;}
.fl{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;margin-top:9px;}
.af{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;background:var(--bg2);}
.af h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--bg);font-family:inherit;outline:none;writing-mode:horizontal-tb;}
input:focus,select:focus,textarea:focus{border-color:var(--text3);}
label,button,.tab,.btn-p,.btn-o,.badge,.mn,.ms,.fl{writing-mode:horizontal-tb !important;text-orientation:mixed !important;}
.nc{border-left:2px solid #378add;padding:8px 11px;margin-bottom:7px;background:var(--bg2);border-radius:var(--radius);}
.nc.nw{border-left-color:#ba7517;}
.pw{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:6px 0 3px;}
.pb{height:100%;border-radius:3px;}
.ab{background:var(--danger-bg);border-radius:var(--radius);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--danger-text);display:flex;align-items:center;gap:8px;}
.ab.aw{background:var(--warn-bg);color:var(--warn-text);}
.sl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px;}
.icz{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:24px 16px;text-align:center;cursor:pointer;margin-bottom:12px;}
.icz:hover{background:var(--bg2);}
.es{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px;}
.rb{display:flex;gap:6px;margin-top:10px;}
.icon{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius);font-size:16px;flex-shrink:0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.dialog{background:var(--bg);border-radius:var(--radius-lg);padding:18px;width:100%;max-width:360px;border:0.5px solid var(--border);max-height:90vh;overflow-y:auto;}
/* 多图预览 */
.img-grid{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:var(--bg2);border-radius:var(--radius);margin-bottom:8px;min-height:44px;}
.img-thumb-wrap{position:relative;display:inline-block;}
.img-thumb{width:68px;height:68px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);display:block;}
.img-rm{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#e24b4a;color:#fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;}
/* 上传分析区 */
.analyze-box{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:12px;background:var(--bg2);}
.analyze-box h4{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;}
.analyzing{text-align:center;padding:20px;font-size:12px;color:var(--text2);}
/* ICS */
.ib{font-size:11px;color:var(--info-text);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;margin-top:4px;margin-right:10px;}
/* Cal */
.cal-day{text-align:center;font-size:12px;padding:5px 2px;border-radius:var(--radius);cursor:default;}
.ev-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;background:var(--bg);}
/* TL */
.tl-item{display:flex;gap:10px;margin-bottom:12px;}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.tl-line{width:1px;background:var(--border);flex:1;margin-top:3px;}
/* Child */
.child-section{margin-bottom:14px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:640px){.sidebar{width:56px;}.tab{padding:5px 7px;font-size:11px;}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="member-list" id="memberList"></div>
    <div class="add-member" onclick="showAddMember()" title="添加成员">＋</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div style="display:flex;align-items:center;gap:6px;">
          <h2 id="mt" style="font-size:15px;font-weight:600;">家庭健康档案</h2>
          <span id="editMemberBtn" onclick="showEditMember(CM)" style="font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:var(--radius);border:0.5px solid var(--border2);">编辑</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px;">
          <div class="tag-row" id="tagRow"></div>
          <span onclick="showEditTags()" style="font-size:10px;padding:1px 7px;border-radius:20px;background:var(--bg2);color:var(--text2);cursor:pointer;border:0.5px solid var(--border2);flex-shrink:0;">＋ 编辑标签</span>
        </div>
      </div>

    </div>
    <div class="tab-bar" id="tabBar">
      <button class="tab active" onclick="st('feelings',this)">💬 自我感受</button>
      <button class="tab" onclick="st('notes',this)">📋 病历记录</button>
      <button class="tab" onclick="st('reports',this)">🧪 检查报告</button>
      <button class="tab" onclick="st('imaging',this)">🔬 影像报告</button>
      <button class="tab" onclick="st('meds',this)">💊 用药管理</button>
      <button class="tab" onclick="st('child',this)">👶 儿童健康</button>
      <button class="tab" onclick="st('calendar',this)">📅 日历</button>
      <button class="tab" onclick="st('timeline',this)">📈 时间线</button>
    </div>
    <div class="content" id="mc"></div>
  </div>
</div>

<script>
// ── 配置 ──────────────────────────────────────────────────────────────
const WORKER_URL = 'https://familyhealthv1.wangyidan1113.workers.dev';
const STORE_KEY  = 'family_health_v2';

// ── 工具函数 ──────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ if(!s)return''; const p=s.split('-'); return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日'; }
function dBet(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function addD(s,n){ const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function calcFU(from,text){
  const d=new Date(from);
  const m2=text.match(/(\d+)\s*周/), m3=text.match(/(\d+)\s*个?月/), m4=text.match(/(\d+)\s*天/);
  if(m2) d.setDate(d.getDate()+parseInt(m2[1])*7);
  else if(m3) d.setMonth(d.getMonth()+parseInt(m3[1]));
  else if(m4) d.setDate(d.getDate()+parseInt(m4[1]));
  else return null;
  return d.toISOString().split('T')[0];
}
const today = new Date(); today.setHours(0,0,0,0);
const TS = today.toISOString().split('T')[0];
let calMonth = new Date(today.getFullYear(), today.getMonth(), 1);

// ── 状态管理 ──────────────────────────────────────────────────────────
function defState(){
  return {
    currentMember: 0,
    members:[
      {id:0, name:'成员1', emoji:'👤', c1:'#e1f5ee', c2:'#0f6e56', tags:[], isChild:false},
      {id:1, name:'成员2', emoji:'👤', c1:'#fbeaf0', c2:'#993556', tags:[], isChild:false},
    ],
    data:{
      0:{reports:[], notes:[], imaging:[], meds:[], events:[], feelings:[], child:{vaccines:[],growth:[],allergies:[]}},
      1:{reports:[], notes:[], imaging:[], meds:[], events:[], feelings:[], child:{vaccines:[],growth:[],allergies:[]}},
    }
  };
}
function loadState(){
  try{ const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r); }catch(e){}
  return defState();
}
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }

let state = loadState();
let CM = state.currentMember||0;
let CT = 'notes';

function AD(id){ 
  if(id===undefined) id=CM;
  if(!state.data[id]) state.data[id]={reports:[],notes:[],imaging:[],meds:[],events:[],child:{vaccines:[],growth:[],allergies:[]}};
  if(!state.data[id].child) state.data[id].child={vaccines:[],growth:[],allergies:[]};
  return state.data[id];
}

// ── AI 识别核心 ───────────────────────────────────────────────────────
function readFile(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>resolve({b64:ev.target.result.split(',')[1], mime:file.type||'image/jpeg'});
    r.readAsDataURL(file);
  });
}

async function callAI(b64, mime, prompt){
  const resp = await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({imageBase64:b64, imageMime:mime, customPrompt:prompt})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error);
  let text = data.text||'';
  // 如果 worker 标记了非 JSON
  if(data._notJson){
    return {_raw: text};
  }
  // 提取 JSON
  const s=text.indexOf('{'), e=text.lastIndexOf('}');
  if(s!==-1&&e>s) text=text.slice(s,e+1).trim();
  else return {_raw: text};
  try {
    return JSON.parse(text);
  } catch(parseErr) {
    return {_raw: text, _parseError: parseErr.message};
  }
}

// 渲染多图预览网格（返回HTML字符串 + 存储files到window._imgStore）
function makeImgGrid(files, storeKey, onRemoveFn){
  window._imgStore = window._imgStore||{};
  window._imgStore[storeKey] = Array.from(files);
  return renderImgGrid(storeKey, onRemoveFn);
}

function renderImgGrid(storeKey, onRemoveFn){
  const grid = document.getElementById('grid_'+storeKey);
  if(!grid) return;
  const files = (window._imgStore||{})[storeKey]||[];
  grid.innerHTML = '';
  if(!files.length){
    grid.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px;">暂无图片</div>';
    return;
  }
  files.forEach(function(f, i){
    const url = URL.createObjectURL(f);
    const wrap = document.createElement('div');
    wrap.className = 'img-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'img-thumb';
    img.src = url;
    img.alt = '图片'+(i+1);
    const rm = document.createElement('div');
    rm.className = 'img-rm';
    rm.textContent = '×';
    rm.addEventListener('click', function(){
      window._removeImgAt(storeKey, i, onRemoveFn);
    });
    wrap.appendChild(img);
    wrap.appendChild(rm);
    grid.appendChild(wrap);
  });
}

function _removeImgAt(storeKey, idx, onRemoveFn){
  const files = (window._imgStore||{})[storeKey]||[];
  files.splice(idx, 1);
  window._imgStore[storeKey] = files;
  renderImgGrid(storeKey, onRemoveFn);
  // 同步更新文件计数显示
  const countEl = document.getElementById('repFileCount') || document.getElementById('noteImgCount');
  if(countEl && files.length) countEl.textContent = files.length+'张图片已选';
  else if(countEl && !files.length) countEl.textContent = '';
}

function removeImg(storeKey, idx){
  _removeImgAt(storeKey, idx, 'removeImg');
}

// ── 侧边栏 ────────────────────────────────────────────────────────────
function renderSidebar(){
  const list = document.getElementById('memberList');
  list.innerHTML = state.members.map(m=>{
    const d=AD(m.id);
    const parts=[];
    if(d.reports.length) parts.push(d.reports.length+'报告');
    if(d.notes.length) parts.push(d.notes.length+'病历');
    if(d.imaging.length) parts.push(d.imaging.length+'影像');
    const am=d.meds.filter(x=>x.active);
    if(am.length) parts.push(am.length+'种药');
    const sub = (m.tags&&m.tags.length) ? m.tags.slice(0,2).join('·') : (parts.join('·')||'暂无记录');
    return `<div class="mi${CM===m.id?' active':''}" onclick="selMember(${m.id},this)" title="${esc(m.name)}" onlongpress="showEditMember(${m.id})">
      <div class="av" style="background:${m.c1};color:${m.c2};">${m.emoji||m.name[0]}</div>
    </div>`;
  }).join('');
}

function selMember(id, el){
  document.querySelectorAll('.mi').forEach(e=>e.classList.remove('active'));
  if(el) el.classList.add('active');
  CM=id; state.currentMember=id;
  const m=state.members.find(x=>x.id===id);
  document.getElementById('mt').textContent=(m?m.name:'')+'的健康档案';
  const tagRow=document.getElementById('tagRow');
  if(tagRow&&m){
    const tags=m.tags||[];
    tagRow.innerHTML=tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')+(m.isChild?'<span class="tag-chip child">👶儿童</span>':'');
  }
  saveState(); rt(CT);
}

function st(t,el){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  if(el) el.classList.add('active');
  CT=t; rt(t);
}

function rt(t){
  if(t==='notes') rNotes();
  else if(t==='reports') rReports();
  else if(t==='imaging') rImaging();
  else if(t==='meds') rMeds();
  else if(t==='child') rChild();
  else if(t==='feelings') rFeelings();
  else if(t==='calendar') rCalendar();
  else if(t==='timeline') rTimeline();
}

// ── 弹窗 ──────────────────────────────────────────────────────────────
function showOverlay(html){
  let ov=document.getElementById('ov');
  if(!ov){ov=document.createElement('div');ov.id='ov';ov.className='overlay';ov.onclick=e=>{if(e.target===ov)closeOverlay();};document.body.appendChild(ov);}
  ov.innerHTML=html; ov.style.display='flex';
}
function closeOverlay(){ const ov=document.getElementById('ov'); if(ov) ov.style.display='none'; }
function dlFile(content,mime,name){ const b=new Blob([content],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

// ── 病历记录 ──────────────────────────────────────────────────────────
function rNotes(){
  const notes=AD().notes; const c=document.getElementById('mc');
  let html=`<button class="btn-p" style="width:100%;margin-bottom:12px;" onclick="showAddNote()">＋ 添加病历记录（支持上传图片AI识别）</button>`;
  if(!notes.length){html+=`<div class="es">📋<br><br>暂无病历记录</div>`;c.innerHTML=html;return;}
  html+=notes.map(n=>`<div class="card cp" onclick="this.classList.toggle('open')">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="icon" style="background:#e6f1fb;font-size:18px;">🩺</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:500;">${esc(n.type||'门诊病历')} — ${esc(n.diagnosis||'')} <span class="badge binfo">${esc(n.department||'')}</span></div>
        <div style="font-size:11px;color:var(--text2);margin-top:1px;">${fmtDate(n.date)}${n.doctor?' · '+esc(n.doctor)+'医生':''} · ${esc(n.hospital||'')}</div>
      </div>
    </div>

async function doNoteAI(sk){
  const files=(window._imgStore||{})[sk]||[];
  if(!files.length){alert('请先选择图片');return;}
  const st=document.getElementById('note_ai_status');
  if(st) st.textContent='⏳ AI 识别中，请稍候…';
  const prompt='请仔细识别这张医疗病历图片（门诊病历/处方单/诊断书/出院小结等）。'
    +'只输出JSON，不要任何markdown，第一个字符必须是{：'
    +'{"type":"门诊病历或住院记录或急诊记录或复诊记录","date":"就诊日期YYYY-MM-DD",'
    +'"hospital":"医院全称","department":"科室","doctor":"医生姓名",'
    +'"diagnosis":"主要诊断（完整）",'
    +'"content":"病历内容和医嘱的完整文字，包括检查结果、治疗方案、用药说明、注意事项",'
    +'"followUp":"复查要求和时间",'
    +'"medications":"本次开具的所有药物，逗号分隔"}'
    +'。请完整提取报告中的文字内容，不要遗漏。无法识别返回{"error":"原因"}';
  try{
    const results=[];
    for(let i=0;i<files.length;i++){
      if(st) st.textContent=`⏳ 正在识别第${i+1}/${files.length}张…`;
      const {b64,mime}=await readFile(files[i]);
      try{
        results.push(await callAI(b64,mime,prompt));
      }catch(e){
        if(st) st.textContent='❌ 错误：'+e.message;
        results.push({_raw:e.message, error:e.message});
      }
    }
    if(!results.length){if(st) st.textContent='❌ 识别失败，请手动填写';return;}
    const main=results[0];
    // 如果 JSON 解析失败，把原始文本放到结论框里
    if(main._raw){
      if(st) st.textContent='⚠️ AI识别完成，但格式转换失败，已将原始内容填入结论框，请手动整理';
      const concl=document.getElementById('iConclusion');
      if(concl) concl.value=main._raw.slice(0,1000);
      return;
    }
    if(main.error){if(st) st.textContent='⚠️ '+main.error;return;}
    // 合并多张
    if(results.length>1){
      const extra=results.slice(1).map(r=>r.content||'').filter(Boolean).join('\n');
      if(extra) main.content=(main.content||'')+'\n\n'+extra;
      const meds=results.slice(1).map(r=>r.medications||'').filter(Boolean).join('、');
      if(meds) main.medications=[main.medications,meds].filter(Boolean).join('、');
    }
    // 填入表单
    if(main.date) document.getElementById('nDate').value=main.date;
    if(main.type){const sel=document.getElementById('nType');for(let i=0;i<sel.options.length;i++){if(sel.options[i].text.includes(main.type)){sel.selectedIndex=i;break;}}}
    if(main.hospital) document.getElementById('nHosp').value=main.hospital;
    if(main.department) document.getElementById('nDept').value=main.department;
    if(main.doctor) document.getElementById('nDoc').value=main.doctor;
    if(main.diagnosis) document.getElementById('nDiag').value=main.diagnosis;
    let ct=main.content||'';
    if(main.medications) ct+=(ct?'\n\n':'')+'【开具药物】'+main.medications;
    if(ct) document.getElementById('nContent').value=ct;
    if(main.followUp) document.getElementById('nFollowUp').value=main.followUp;
    if(st) st.textContent=`✅ 识别完成（${files.length}张），已自动填入，请检查后保存`;
  }catch(err){
    const msg=err.message||'';
    if(st) st.textContent='❌ '+(msg.startsWith('RAW:')||msg.startsWith('PARSE_FAIL:')?'AI返回格式有误，请手动填写':'错误：'+msg);
  }
}

async function doRepAI(sk){
  const files=(window._imgStore||{})[sk]||[];
  if(!files.length){alert('请先选择图片');return;}
  const typeVal=document.getElementById('repType')?.value||'auto';
  const st2=document.getElementById('rep_ai_status');
  const res=document.getElementById('rep_result');
  if(st2) st2.textContent='⏳ AI 识别中…';
  if(res) res.innerHTML='';
  const typeStr=typeVal!=='auto'?`（报告类型：${typeVal}）`:'';
  const prompt='请仔细识别这张医疗检查报告图片'+typeStr+'。'
    +'只输出JSON，不要任何markdown或多余文字，第一个字符必须是{：'
    +'{"reportType":"报告类型名称","date":"检查日期YYYY-MM-DD","hospital":"医院名称","summary":"2-3句分析总结，说明哪些指标异常及临床意义","abnormalCount":数字,'
    +'"metrics":[{"name":"指标全称（英文缩写）","value":"数值+单位","reference":"参考范围","status":"ok或warn或danger"}]}'
    +'。status规则：在参考范围内=ok，轻度偏高/偏低=warn，明显异常=danger。'
    +'把报告中所有指标都列出来，不要遗漏。无法识别返回{"error":"原因"}';
  try{
    const results=[];
    for(let i=0;i<files.length;i++){
      if(st2) st2.textContent=`⏳ 正在识别第${i+1}/${files.length}张…`;
      const {b64,mime}=await readFile(files[i]);
      try{
        results.push(await callAI(b64,mime,prompt));
      }catch(e){
        if(st2) st2.textContent='❌ 错误：'+e.message;
        results.push({_raw:e.message, error:e.message});
      }
    }
    if(!results.length){if(st2) st2.textContent='❌ 识别失败';return;}
    // 过滤掉解析失败的（_raw）和 error
    const valid=results.filter(r=>!r.error&&!r._raw);
    if(!valid.length){
      // 如果有 _raw，说明 AI 有返回但解析失败
      const hasRaw=results.find(r=>r._raw);
      if(hasRaw){if(st2) st2.textContent='⚠️ AI有返回内容但格式有误，请切换到"手动录入报告"粘贴内容';return;}
      if(st2) st2.textContent='❌ '+(results[0].error||'识别失败');return;
    }
    const metricsMap={};
    valid.forEach(r=>(r.metrics||[]).forEach(m=>{ metricsMap[m.name]=m; }));
    const allMetrics=Object.values(metricsMap);
    const abn=allMetrics.filter(m=>m.status!=='ok').length;
    const merged={
      reportType:valid[0].reportType||'医疗报告',
      date:valid[0].date||'',
      hospital:valid[0].hospital||'',
      summary:(valid.length===1?valid[0].summary:'共'+valid.length+'张报告。'+valid.map(r=>r.summary).filter(Boolean).join(' ')),
      abnormalCount:abn, metrics:allMetrics, pageCount:files.length
    };
    window._lastMerged=merged;
    if(st2) st2.textContent=`✅ 识别完成（${files.length}张）`;
    // 把识别到的日期填入日期框
    if(merged.date && document.getElementById('repDate')){
      document.getElementById('repDate').value=merged.date;
    }
    if(merged.hospital && document.getElementById('repHosp')){
      document.getElementById('repHosp').value=merged.hospital;
    }
    // 显示结果
    const bc=abn===0?'bok':abn<=2?'bwarn':'bdanger';
    const warnM=allMetrics.filter(m=>m.status!=='ok');
    const okM=allMetrics.filter(m=>m.status==='ok');
    if(res) res.innerHTML=`
      <div style="margin-top:10px;border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-weight:500;">${esc(merged.reportType)}</span>
          <span class="badge ${bc}">${abn===0?'全部正常':abn+'项异常'}</span>
        </div>
        <div class="ai-box">🤖 ${esc(merged.summary)}</div>
        ${warnM.length?`<div class="sl">异常指标</div><div class="mg">${warnM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v warn">${esc(m.value)}</div><div class="mc-r">参考 ${esc(m.reference)} ⚠</div></div>`).join('')}</div>`:''}
        ${okM.length?`<div class="sl">正常（${okM.length}项）</div><div class="mg">${okM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v ok">${esc(m.value)}</div><div class="mc-r">✓</div></div>`).join('')}</div>`:''}
        <div style="display:flex;gap:6px;margin-top:8px;">
          <button class="btn-p" onclick="saveRepResult()" style="flex:1;">💾 保存到档案</button>
          <button class="btn-o" onclick="window._lastMerged=null;document.getElementById('rep_result').innerHTML='';document.getElementById('rep_ai_status').textContent='';">清除</button>
        </div>
      </div>`;
  }catch(err){
    const msg=err.message||'';
    if(st2) st2.textContent='❌ '+(msg.startsWith('RAW:')||msg.startsWith('PARSE_FAIL:')?'AI返回格式有误，请重试或手动录入':'错误：'+msg);
  }
}

async function doImagingAI(sk){
  const files=(window._imgStore||{})[sk]||[];
  if(!files.length){alert('请先选择影像图片');return;}
  const st=document.getElementById('img_ai_status');
  if(st) st.textContent='⏳ AI 正在识别影像报告…';

  const prompt='请仔细识别这张医疗影像报告图片（超声/CT/MRI/X光/内镜等）。'
    +'只输出JSON，不要任何markdown，第一个字符必须是{：'
    +'{"type":"影像类型全称","hospital":"医院全称","department":"科室","doctor":"报告医生姓名","date":"检查日期YYYY-MM-DD",'
    +'"findings":[{"location":"解剖部位名称","status":"ok或warn或danger","desc":"该部位所见的完整原文描述"}],'
    +'"conclusion":"影像提示/结论的完整原文","suggestion":"随访建议和复查要求","aiSummary":"2-3句临床总结，说明主要发现和建议"}'
    +'。status规则：完全正常=ok；有任何异常发现（结石/肌瘤/囊肿/占位/积液/钙化/增大/缩小/回声不均/边界不清等）=warn；高度怀疑恶性或危急情况=danger。'
    +'严格忠实于报告原文，凡报告中提到的异常必须标warn或danger，不得美化为ok。'
    +'无法识别返回{"error":"原因"}';

  try{
    const results=[];
    for(let i=0;i<files.length;i++){
      if(st) st.textContent='⏳ 正在识别第'+(i+1)+'/'+files.length+'张…';
      const {b64,mime}=await readFile(files[i]);
      try{
        const r=await callAI(b64,mime,prompt);
        results.push(r);
      }catch(e){
        if(st) st.textContent='❌ 错误：'+e.message;
        console.error('callAI error:', e);
        results.push({_raw: e.message, error: e.message});
      }
    }
    if(!results.length){if(st) st.textContent='❌ 识别失败，请手动填写';return;}
    const main=results[0];
    // 如果 JSON 解析失败，把原始文本放到结论框里
    if(main._raw){
      if(st) st.textContent='⚠️ AI识别完成，但格式转换失败，已将原始内容填入结论框，请手动整理';
      const concl=document.getElementById('iConclusion');
      if(concl) concl.value=main._raw.slice(0,1000);
      return;
    }
    if(main.error){if(st) st.textContent='⚠️ '+main.error;return;}

    // 合并多张结果的findings
    if(results.length>1){
      results.slice(1).forEach(r=>{
        (r.findings||[]).forEach(f=>{
          if(!main.findings.find(x=>x.location===f.location)) main.findings.push(f);
        });
      });
    }

    // 自动填入表单
    // 直接填入AI识别的类型
    if(main.type) document.getElementById('iType').value=main.type;
    if(main.hospital) document.getElementById('iHosp').value=main.hospital;
    if(main.department) document.getElementById('iDept').value=main.department;
    if(main.doctor) document.getElementById('iDoc').value=main.doctor;
    if(main.date) document.getElementById('iDate').value=main.date;

    // 填入findings（每行：部位,状态,描述）
    if(main.findings&&main.findings.length){
      document.getElementById('iFindings').value=main.findings.map(f=>f.location+','+f.status+','+f.desc).join('\n');
    }
    if(main.conclusion) document.getElementById('iConclusion').value=main.conclusion;
    if(main.suggestion) document.getElementById('iSugg').value=main.suggestion;
    const abnCount=(main.findings||[]).filter(f=>f.status!=='ok').length;
    if(st) st.textContent='✅ 识别完成！发现 '+abnCount+' 项异常，已自动填入，请检查后保存';
  }catch(err){
    const msg = err.message||'';
    if(msg.startsWith('RAW:')){
      if(st) st.textContent='⚠️ AI返回了内容但格式有误，请手动填写。原始内容：'+msg.slice(4,100);
    } else if(msg.startsWith('PARSE_FAIL:')){
      // Try to use raw text as conclusion at least
      if(st) st.textContent='⚠️ JSON解析失败，请手动填写。';
      const rawText = msg.slice(11);
      const concl = document.getElementById('iConclusion');
      if(concl && !concl.value) concl.value = rawText;
    } else {
      if(st) st.textContent='❌ 错误：'+msg;
    }
  }
}

function getRD(m){const du=Math.max(0,dBet(m.startDate,TS));return Math.max(0,m.totalQty-du*m.timesPerDay*m.dosePerTime);}
function getDays(m){const r=getRD(m),d=m.timesPerDay*m.dosePerTime;return d>0?Math.floor(r/d):999;}
function getROD(m){return addD(TS,getDays(m));}
function getRRD(m){return addD(getROD(m),-7);}
function getMSt(m){if(!m.active)return'done';const d=getDays(m);return d<=0?'empty':d<=7?'urgent':d<=14?'warning':'ok';}

          <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">${(m.times||[]).map(t=>`<span style="background:var(--bg2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);">⏰${esc(t)}</span>`).join('')}</div>

  const done=document.querySelector('input[name="vD"]:checked').value==='1';

  const v={id:uid(),name,done,hospital:document.getElementById('vHosp').value};

  saveState();closeOverlay();rChild();
}

// ── 健康标签 ──────────────────────────────────────────────────────────
function showEditTags(){
  const m=state.members.find(x=>x.id===CM); if(!m)return;
  const cur=m.tags||[];
  const presetChips=PRESET_TAGS.map(function(t){
    const active=cur.includes(t);
    return '<div onclick="this.dataset.active=this.dataset.active===\'1\'?\'0\':\'1\';this.style.background=this.dataset.active===\'1\'?\'#eeedfe\':\'var(--bg2)\';this.style.color=this.dataset.active===\'1\'?\'#534ab7\':\'var(--text)\';this.style.borderColor=this.dataset.active===\'1\'?\'#534ab7\':\'var(--border2)\';" data-tag="'+t+'" data-active="'+(active?'1':'0')+'" style="font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid '+(active?'#534ab7':'var(--border2)')+';cursor:pointer;background:'+(active?'#eeedfe':'var(--bg2)')+';color:'+(active?'#534ab7':'var(--text)')+';">'+t+'</div>';
  }).join('');

  // 自定义标签（不在预设里的）带删除按钮
  const customTags = cur.filter(t=>!PRESET_TAGS.includes(t));
  const customChips = customTags.map(function(t){
    return '<div data-tag="'+t+'" data-active="1" data-custom="1" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:20px;border:0.5px solid #534ab7;background:#eeedfe;color:#534ab7;">'
      +t
      +'<span onclick="this.parentElement.remove()" style="font-size:13px;font-weight:600;cursor:pointer;color:#534ab7;line-height:1;">×</span>'
      +'</div>';
  }).join('');

  showOverlay('<div class="dialog"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px;">编辑健康标签</h3>'
    +'<div style="font-size:11px;color:var(--text2);margin-bottom:8px;">点击选择或取消，可多选</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;" id="tagPicker">'+presetChips+'</div>'
    +(customChips?'<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;">自定义标签</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;" id="customTagPicker">'+customChips+'</div>':'<div id="customTagPicker" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;"></div>')
    +'<label class="fl">添加自定义标签</label>'
    +'<div style="display:flex;gap:6px;margin-top:4px;">'
    +'<input id="customTag" placeholder="输入标签名称" style="flex:1;"">'
    +'<button class="btn-o" onclick="addCustomTagChip()" style="flex-shrink:0;padding:6px 12px;">添加</button>'
    +'</div>'
    +'<div class="rb" style="margin-top:12px;"><button class="btn-p" onclick="saveTags()" style="flex:1;">保存标签</button><button class="btn-o" onclick="closeOverlay()">取消</button></div>'
    +'</div>');
}


function addCustomTagChip(){
  const inp=document.getElementById('customTag');
  const val=inp.value.trim(); if(!val){return;}
  // 检查是否已存在
  const existing=Array.from(document.querySelectorAll('#tagPicker [data-tag], #customTagPicker [data-tag]')).map(e=>e.dataset.tag);
  if(existing.includes(val)){alert('标签已存在');return;}
  const picker=document.getElementById('customTagPicker');
  if(!picker) return;
  const div=document.createElement('div');
  div.dataset.tag=val; div.dataset.active='1'; div.dataset.custom='1';
  div.style.cssText='display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:20px;border:0.5px solid #534ab7;background:#eeedfe;color:#534ab7;';
  div.innerHTML=val+'<span onclick="this.parentElement.remove()" style="font-size:13px;font-weight:600;cursor:pointer;color:#534ab7;line-height:1;">×</span>';
  picker.appendChild(div);
  inp.value='';
}

function saveTags(){
  const m=state.members.find(x=>x.id===CM); if(!m)return;
  const presetSelected=Array.from(document.querySelectorAll('#tagPicker [data-tag]')).filter(c=>c.dataset.active==='1').map(c=>c.dataset.tag);
  const customSelected=Array.from(document.querySelectorAll('#customTagPicker [data-tag]')).filter(c=>c.dataset.active!=='0').map(c=>c.dataset.tag);
  m.tags=[...presetSelected,...customSelected];
  saveState();renderSidebar();
  // 刷新顶部标签显示
  const tagRow=document.getElementById('tagRow');
  if(tagRow){
    const tags=m.tags||[];
    tagRow.innerHTML=tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')+(m.isChild?'<span class="tag-chip child">👶儿童</span>':'');
  }
  closeOverlay();rt(CT);
}

// ── 日历提醒 ──────────────────────────────────────────────────────────
function rCalendar(){
  const evs=AD().events, meds=AD().meds.filter(m=>m.active);
  const c=document.getElementById('mc');
  const yr=calMonth.getFullYear(), mo=calMonth.getMonth();
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dNames=['日','一','二','三','四','五','六'];
  const eMap={}, mMap={};
  evs.forEach(e=>{if(e.date)(eMap[e.date]=eMap[e.date]||[]).push(e);});
  meds.forEach(m=>{const d=getRRD(m);if(d)(mMap[d]=mMap[d]||[]).push(m);});
  const fd=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate(), pd=new Date(yr,mo,0).getDate();
  let cells='';
  for(let i=0;i<fd;i++) cells+=`<div style="text-align:center;font-size:12px;padding:5px 2px;color:var(--text3);">${pd-fd+1+i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=new Date(yr,mo,d).getTime()===today.getTime();
    const eArr=eMap[ds]||[], mArr=mMap[ds]||[];
    let bg='',tc='var(--text)',fw='400';
    if(eArr.length){bg='#faeeda';tc='#854f0b';fw='600';}
    else if(mArr.length){bg='#eeedfe';tc='#534ab7';fw='600';}
    else if(isT){bg='var(--bg2)';}
    const oc=(eArr.length||mArr.length)?'onclick="hlEv(\''+ds+'\')" style="cursor:pointer;"' :'';
    cells+=`<div ${oc} style="text-align:center;font-size:12px;padding:5px 2px;border-radius:var(--radius);background:${bg};color:${tc};font-weight:${fw};">${d}${(eArr.length||mArr.length)?`<div style="width:4px;height:4px;border-radius:50%;background:currentColor;margin:1px auto 0;"></div>`:'<div style="height:5px;"></div>'}</div>`;
  }
  const rem=(7-(fd+dim)%7)%7; for(let i=1;i<=rem;i++) cells+=`<div style="text-align:center;font-size:12px;padding:5px 2px;color:var(--text3);">${i}</div>`;
  const allEvs=[...evs].sort((a,b)=>a.date.localeCompare(b.date));
  const up=allEvs.filter(e=>e.date>=TS), past=allEvs.filter(e=>e.date<TS).reverse();
  const rEv=(e,ip)=>{
    const pts=e.date.split('-');
    const mon=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'][parseInt(pts[1])];
    const bgC=e.isMedReminder?'#eeedfe':'#faeeda'; const txC=e.isMedReminder?'#534ab7':'#854f0b';
    return `<div class="ev-item" id="ev_${e.date.replace(/-/g,'')}" style="${ip?'opacity:0.5;':''}">
      <div style="border-radius:var(--radius);padding:3px 7px;text-align:center;min-width:38px;flex-shrink:0;background:${ip?'var(--bg2)':bgC};">
        <div style="font-size:9px;color:${ip?'var(--text3)':txC};">${mon}</div>
        <div style="font-size:17px;font-weight:600;line-height:1.1;color:${ip?'var(--text2)':txC};">${parseInt(pts[2])}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:500;">${e.isMedReminder?'💊 ':''}${esc(e.title)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:1px;">${[e.hospital,e.department,e.doctor?e.doctor+'医生':''].filter(Boolean).join(' · ')}</div>
        ${e.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px;">${esc(e.note)}</div>`:''}
        <div style="margin-top:5px;">
          <button class="ib" onclick="dlICS('${e.id}')">📅 导出.ics</button>
          <button class="ib" style="color:var(--text2);" onclick="cpEv('${e.id}')">📋 复制</button>
          <button class="ib" style="color:var(--danger-text);" onclick="delEv('${e.id}')">🗑 删除</button>
        </div>
      </div>
    </div>`;
  };
  c.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button class="btn-o" onclick="chM(-1)">◀</button>
      <span style="font-size:15px;font-weight:600;">${yr}年 ${mNames[mo]}</span>
      <button class="btn-o" onclick="chM(1)">▶</button>
    </div>
    <div style="display:flex;gap:8px;font-size:11px;color:var(--text2);margin-bottom:8px;">
      <span style="background:#faeeda;padding:2px 8px;border-radius:4px;color:#854f0b;">复查</span>
      <span style="background:#eeedfe;padding:2px 8px;border-radius:4px;color:#534ab7;">开药</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;">
      ${dNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);padding:3px 0;">${d}</div>`).join('')}${cells}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="sl" style="margin-bottom:0;">即将到来（${up.length}）</div>
      <button class="btn-o" onclick="showEvDialog('复查','','','','','')">＋ 新增提醒</button>
    </div>
    ${up.length?up.map(e=>rEv(e,false)).join(''):'<div style="text-align:center;color:var(--text3);padding:12px;font-size:12px;">暂无即将到来的提醒</div>'}
    ${past.length?`<div class="sl" style="margin-top:14px;margin-bottom:7px;">已过期（${past.length}）</div>${past.map(e=>rEv(e,true)).join('')}`:''}
  `;
}

function saveEv(){
  const ev={id:uid(),title:document.getElementById('evT').value,date:document.getElementById('evD').value,hospital:document.getElementById('evH').value,department:document.getElementById('evDp').value,doctor:document.getElementById('evDc').value,note:document.getElementById('evN').value};
  if(!ev.title||!ev.date){alert('请填写事项和日期');return;}
  AD().events.unshift(ev); saveState();renderSidebar();closeOverlay();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[5].classList.add('active');

// ── 时间线 ────────────────────────────────────────────────────────────
function rTimeline(){
  const {reports,notes,imaging,meds,events}=AD();
  const c=document.getElementById('mc');
  const all=[
    ...reports.map(r=>({...r,_t:'report',_sd:r.date})),
    ...notes.map(n=>({...n,_t:'note',_sd:n.date})),
    ...imaging.map(i=>({...i,_t:'imaging',_sd:i.date})),
    ...meds.filter(m=>m.active).map(m=>({...m,_t:'med',_sd:getRRD(m)})),
    ...events.map(e=>({...e,_t:'event',_sd:e.date}))
  ].sort((a,b)=>b._sd.localeCompare(a._sd));

  if(!all.length){c.innerHTML=`<div class="es">📈<br><br>暂无记录<br><br>上传报告或添加病历后会在这里显示</div>`;return;}

  // 按月分组
  const groups={};
  all.forEach(item=>{
    const month=item._sd.slice(0,7); // YYYY-MM
    if(!groups[month]) groups[month]=[];
    groups[month].push(item);
  });

  const monthNames=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let html='<div style="font-size:11px;color:var(--text3);margin-bottom:12px;">共 '+all.length+' 条记录，按时间倒序排列</div>';

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(month=>{
    const [yr,mo]=month.split('-');
    html+=`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px;">
      <div style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;">${yr}年 ${monthNames[parseInt(mo)]}</div>
      <div style="flex:1;height:0.5px;background:var(--border);"></div>
    </div>`;

    groups[month].forEach((item,i)=>{
      const isFut=item._sd>TS;
      const isLast=i===groups[month].length-1;
      let dot,icon,title,sub,bc='';

      if(item._t==='report'){
        const abn=item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length;
        dot=abn===0?'#9fe1cb':'#fac775';icon='🧪';
        title=esc(item.reportType||'检查报告')+(item.pageCount>1?' ('+item.pageCount+'张)':'');
        sub=(item.hospital?esc(item.hospital)+' · ':'')+( abn===0?'<span style="color:var(--success-text);">全部正常</span>':'<span style="color:var(--warn-text);">'+abn+'项异常</span>');
        bc=abn===0?'bok':abn<=2?'bwarn':'bdanger';
      } else if(item._t==='note'){
        dot='#b5d4f4';icon='🩺';
        title=esc(item.type||'门诊病历')+(item.diagnosis?' — '+esc(item.diagnosis):'');
        sub=(item.hospital?esc(item.hospital)+' · ':'')+( item.doctor?esc(item.doctor)+'医生':'');
        bc='binfo';
      } else if(item._t==='imaging'){
        const abn=(item.findings||[]).filter(f=>f.status!=='ok').length;
        dot=abn===0?'#9fe1cb':'#fac775';icon='🔬';
        title=esc(item.type);
        sub=(item.hospital?esc(item.hospital)+' · ':'')+(abn===0?'<span style="color:var(--success-text);">未见异常</span>':'<span style="color:var(--warn-text);">'+abn+'项需关注</span>');
        bc=abn===0?'bok':'bwarn';
      } else if(item._t==='med'){
        dot='#afa9ec';icon='💊';
        title='开药提醒：'+esc(item.name);
        sub='约剩 '+getDays(item)+' 天用完，建议此前开药';
        bc='bpurple';
      } else {
        dot=isFut?'#fac775':'#d3d1c7';
        icon=item.isMedReminder?'💊':'📅';
        title=esc(item.title);
        sub=[item.hospital,item.doctor?item.doctor+'医生':''].filter(Boolean).map(esc).join(' · ');
        bc=isFut?'bwarn':'';
      }

      const dayStr=item._sd.split('-')[2]; // DD
      // 构建详情内容
      let detail = '';
      if(item._t==='report'){
        const warnM=(item.metrics||[]).filter(m=>m.status!=='ok');
        const okM=(item.metrics||[]).filter(m=>m.status==='ok');
        if(item.summary) detail+=`<div class="ai-box" style="margin-bottom:8px;">📋 ${esc(item.summary)}</div>`;
        if(warnM.length) detail+=`<div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;">异常指标</div><div class="mg">${warnM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v warn">${esc(m.value)}</div><div class="mc-r">参考 ${esc(m.reference)} ⚠</div></div>`).join('')}</div>`;
        if(okM.length) detail+=`<div style="font-size:10px;font-weight:600;color:var(--text3);margin:6px 0 4px;">正常（${okM.length}项）</div><div class="mg">${okM.map(m=>`<div class="mc"><div class="mc-n">${esc(m.name)}</div><div class="mc-v ok">${esc(m.value)}</div><div class="mc-r">✓</div></div>`).join('')}</div>`;
      } else if(item._t==='note'){
        if(item.content) detail+=`<div style="font-size:12px;line-height:1.7;background:var(--bg2);padding:8px 10px;border-radius:var(--radius);margin-bottom:6px;">${esc(item.content)}</div>`;
        if(item.followUp) detail+=`<div style="font-size:11px;color:var(--warn-text);margin-top:4px;">⏰ 复查：${esc(item.followUp)}</div>`;
      } else if(item._t==='imaging'){
        const findings=item.findings||[];
        if(findings.length) detail+=`<div style="border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;margin-bottom:6px;">${findings.map(f=>{const dc=f.status==='ok'?'#9fe1cb':f.status==='warn'?'#fac775':'#e24b4a';const label=f.status==='ok'?'正常':f.status==='warn'?'异常':'需关注';return`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);"><div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;margin-top:2px;"><div style="width:8px;height:8px;border-radius:50%;background:${dc};"></div>${f.status!=='ok'?`<div style="font-size:9px;color:${dc};font-weight:500;">${label}</div>`:''}</div><div><div style="font-size:12px;font-weight:500;">${esc(f.location)}</div><div style="font-size:11px;color:var(--text2);">${esc(f.desc)}</div></div></div>`;}).join('')}</div>`;
        if(item.conclusion) detail+=`<div style="font-size:12px;background:var(--bg2);padding:8px 10px;border-radius:var(--radius);line-height:1.7;">${esc(item.conclusion)}</div>`;
        if(item.suggestion) detail+=`<div style="font-size:11px;color:var(--warn-text);margin-top:6px;">💡 建议：${esc(item.suggestion)}</div>`;
      } else if(item._t==='event'){
        if(item.note) detail+=`<div style="font-size:12px;color:var(--text2);">${esc(item.note)}</div>`;
      }

      const tlId='tl_'+item.id;
      html+=`<div style="display:flex;gap:10px;margin-bottom:8px;">
        <div style="display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--bg2);border:2px solid ${dot};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">${icon}</div>
          ${!isLast?'<div style="width:1.5px;background:var(--border);flex:1;margin-top:3px;min-height:8px;"></div>':''}
        </div>
        <div style="flex:1;padding-bottom:4px;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px;">${item._sd}${isFut&&item._t!=='report'&&item._t!=='note'&&item._t!=='imaging'?' · <span style="color:var(--warn-text);">待办</span>':''}</div>
          <div style="border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;background:var(--bg);" onclick="tlToggle(this,'${tlId}')">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <div style="font-size:13px;font-weight:500;flex:1;">${title}</div>
              <div style="display:flex;align-items:center;gap:6px;">
                ${bc?`<span class="badge ${bc}" style="flex-shrink:0;">${item._t==='report'?(item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length)===0?'正常':(item.abnormalCount||(item.metrics||[]).filter(m=>m.status!=='ok').length)+'项异常':item._t==='note'?esc(item.department||'病历'):item._t==='imaging'?((item.findings||[]).filter(f=>f.status!=='ok').length===0?'未见异常':(item.findings||[]).filter(f=>f.status!=='ok').length+'项需关注'):item._t==='med'?'开药提醒':isFut?'待办':'已完成'}</span>`:''}
                ${detail?'<span style="font-size:10px;color:var(--text3);" class="tl-arrow">▼</span>':''}
              </div>
            </div>
            ${sub?`<div style="font-size:11px;color:var(--text2);margin-top:3px;">${sub}</div>`:''}
            ${detail?`<div id="${tlId}" style="display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;">${detail}</div>`:''}
          </div>
        </div>
      </div>`;
    });
  });

  c.innerHTML=html;
}

const LEVEL_COLORS = ['#9fe1cb','#fac775','#e24b4a'];
const LEVEL_LABELS = ['轻微','中等','严重'];

function rFeelings(){
  const feelings = AD().feelings||[];

    html += `<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px;">

function toggleFeelTag(el, cat, tag){
  const level = parseInt(el.dataset.level||'0');
  const newLevel = (level + 1) % 4; // 0=未选, 1=轻微, 2=中等, 3=严重, 回到0=取消
  el.dataset.level = newLevel;
  el.dataset.active = newLevel > 0 ? '1' : '0';
  if(newLevel === 0){
    el.style.background = 'var(--bg2)';
    el.style.color = 'var(--text)';
    el.style.borderColor = 'var(--border2)';
    el.textContent = tag;
  } else {
    const col = LEVEL_COLORS[newLevel-1];
    el.style.background = col+'22';
    el.style.color = col;
    el.style.borderColor = col;
    el.textContent = tag + ' ' + LEVEL_LABELS[newLevel-1];
  }
}

function saveFeeling(){
  const date = document.getElementById('feelDate').value;
  if(!date){alert('请选择日期');return;}
  const tags = [];
  document.querySelectorAll('[data-active="1"]').forEach(el => {
    tags.push({
      cat: el.dataset.cat,
      name: el.dataset.tag,
      level: parseInt(el.dataset.level)-1  // 存0=轻微,1=中等,2=严重
    });
  });
  if(!tags.length && !document.getElementById('feelNote').value.trim()){
    alert('请至少选择一个症状或填写说明');return;
  }
  const f = {id:uid(), date, tags, note: document.getElementById('feelNote').value.trim()};
  if(!AD().feelings) AD().feelings = [];
  AD().feelings.unshift(f);
  saveState(); renderSidebar(); closeOverlay();
  // 跳转时间线
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  CT='feelings'; rFeelings();
}


// ── 保存成功提示 ──────────────────────────────────────────────────────
function showSaveBanner(msg){
  const c=document.getElementById('mc');
  if(!c) return;
  const banner=document.createElement('div');
  banner.style.cssText='background:var(--success-bg);color:var(--success-text);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;';
  banner.innerHTML='✅ '+msg+'<span onclick="this.parentElement.remove()" style="margin-left:auto;cursor:pointer;opacity:0.6;font-size:16px;">×</span>';
  c.insertBefore(banner, c.firstChild);
  setTimeout(()=>{ if(banner.parentElement) banner.remove(); }, 4000);
}


function tlToggle(card, id){
  const el=document.getElementById(id); if(!el)return;
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  const arrow=card.querySelector('.tl-arrow');
  if(arrow) arrow.textContent=isOpen?'▼':'▲';
}


// ── 编辑成员信息 ──────────────────────────────────────────────────────
function showEditMember(id){
  const m=state.members.find(x=>x.id===id); if(!m) return;
  const emojis=['👨','👩','👦','👧','👴','👵','🧑','👶','👱','🧓'];
  showOverlay(`<div class="dialog">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">编辑成员信息</h3>
    <label class="fl">姓名</label>
    <input id="editName" value="${esc(m.name)}" placeholder="请输入姓名" style="font-size:15px;">
    <label class="fl" style="margin-top:10px;">头像</label>
    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;" id="editEmojiPick">
      ${emojis.map(e=>`<div onclick="pickEditEmoji('${e}',this)" style="font-size:26px;cursor:pointer;padding:4px 6px;border-radius:8px;border:2px solid ${m.emoji===e?'var(--text2)':'transparent'};">${e}</div>`).join('')}
    </div>
    <input type="hidden" id="editEmoji" value="${esc(m.emoji||m.name[0])}">
    <label class="fl" style="margin-top:10px;">是否为儿童</label>
    <div style="display:flex;flex-direction:row;gap:16px;margin-top:6px;">
      <label style="display:flex;flex-direction:row;align-items:center;gap:6px;font-size:14px;cursor:pointer;white-space:nowrap;">
        <input type="radio" name="editIsChild" value="0" ${!m.isChild?'checked':''} style="width:16px;height:16px;flex-shrink:0;"> 成人
      </label>
      <label style="display:flex;flex-direction:row;align-items:center;gap:6px;font-size:14px;cursor:pointer;white-space:nowrap;">
        <input type="radio" name="editIsChild" value="1" ${m.isChild?'checked':''} style="width:16px;height:16px;flex-shrink:0;"> 儿童
      </label>
    </div>
    <div class="rb" style="margin-top:14px;">
      <button class="btn-p" onclick="saveEditMember(${id})" style="flex:1;">保存</button>
      <button class="btn-o" onclick="closeOverlay()">取消</button>
      <button class="btn-o" style="color:var(--danger-text);" onclick="confirmDeleteMember(${id})">删除成员</button>
    </div>
  </div>`);
}

function pickEditEmoji(e, el){
  document.querySelectorAll('#editEmojiPick div').forEach(d=>d.style.borderColor='transparent');
  el.style.borderColor='var(--text2)';
  document.getElementById('editEmoji').value=e;
}

function saveEditMember(id){
  const m=state.members.find(x=>x.id===id); if(!m) return;
  const name=document.getElementById('editName').value.trim();
  if(!name){alert('请输入姓名');return;}
  m.name=name;
  m.emoji=document.getElementById('editEmoji').value;
  m.isChild=document.querySelector('input[name="editIsChild"]:checked')?.value==='1';
  saveState(); renderSidebar(); closeOverlay();
  // 刷新顶部名字
  document.getElementById('mt').textContent=name+'的健康档案';
  const tagRow=document.getElementById('tagRow');
  if(tagRow){
    const tags=m.tags||[];
    tagRow.innerHTML=tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')+(m.isChild?'<span class="tag-chip child">👶儿童</span>':'');
  }
}

function confirmDeleteMember(id){
  const m=state.members.find(x=>x.id===id); if(!m) return;
  if(state.members.length<=1){alert('至少保留一个成员');return;}
  if(!confirm(`确定删除「${m.name}」的所有健康档案？此操作不可恢复。`)) return;
  state.members=state.members.filter(x=>x.id!==id);
  delete state.data[id];
  CM=state.members[0].id;
  state.currentMember=CM;
  saveState(); renderSidebar(); closeOverlay();
  const newM=state.members[0];
  document.getElementById('mt').textContent=newM.name+'的健康档案';
  rt(CT);
}


// ── 初始化 ────────────────────────────────────────────────────────────
renderSidebar();
const initM=state.members.find(x=>x.id===CM);
document.getElementById('mt').textContent=(initM?initM.name:'')+'的健康档案';
if(initM){
  const tags=initM.tags||[];
  document.getElementById('tagRow').innerHTML=tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')+(initM.isChild?'<span class="tag-chip child">👶儿童</span>':'');
}
rt('notes');
</script>
